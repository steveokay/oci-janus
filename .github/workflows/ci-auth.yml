name: CI — auth

on:
  push:
    paths: ["services/auth/**", "libs/**", "proto/auth/**"]
  pull_request:
    paths: ["services/auth/**", "libs/**", "proto/auth/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/auth
          config: ../../.golangci.yml
          # Pin to use the Go toolchain installed by setup-go (1.25.7).
          # The action's bundled golangci-lint binary trails the codebase's
          # required toolchain; install-mode: goinstall builds it from source
          # with the toolchain setup-go just installed.
          version: latest
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/auth && go test -race ./...
      - name: Lint user queries
        run: bash scripts/lint-user-queries.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd services/auth && govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - name: Build binary
        run: cd services/auth && make build
      - name: Build Docker image
        run: |
          docker build \
            --build-arg SERVICE=auth \
            -f services/auth/Dockerfile \
            -t ghcr.io/steveokay/oci-janus/auth:${{ github.sha }} \
            .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/steveokay/oci-janus/auth:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL
