name: CI — core

on:
  push:
    paths: ["services/core/**", "libs/**", "proto/**"]
  pull_request:
    paths: ["services/core/**", "libs/**", "proto/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/core
          config: ../../.golangci.yml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - run: cd services/core && go test -race ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd services/core && govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - name: Build binary
        run: cd services/core && make build
      - name: Build Docker image
        run: |
          docker build \
            --build-arg SERVICE=core \
            -f services/core/Dockerfile \
            -t ghcr.io/steveokay/oci-janus/core:${{ github.sha }} \
            .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/steveokay/oci-janus/core:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL

  conformance:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Run OCI Distribution Spec conformance
        run: cd services/core && make test-conformance
