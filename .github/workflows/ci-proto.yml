name: CI — proto

on:
  push:
    paths: ["proto/**"]
  pull_request:
    paths: ["proto/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with: { version: "1.34.0" }
      - run: cd proto && buf lint

  breaking:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # fetch-depth: 0 is required so the `.git#branch=main` ref below can
      # find the main-branch tip — actions/checkout default is a shallow
      # clone of the PR head only, which doesn't include main.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with: { version: "1.34.0" }
      # Run from the repo root so the `.git` directory is resolvable. The
      # previous `cd proto && buf breaking --against '.git#branch=main'`
      # form looked for `.git` inside `proto/`, which never existed —
      # exit 128 "not a git repository". The `subdir=proto` qualifier
      # scopes the diff to the proto/ subtree.
      - run: buf breaking proto --against '.git#branch=main,subdir=proto'
