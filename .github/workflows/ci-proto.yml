name: CI — proto

on:
  push:
    paths: ["proto/**"]
  pull_request:
    paths: ["proto/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with: { version: "1.34.0" }
      - run: cd proto && buf lint

  breaking:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with: { version: "1.34.0" }
      - run: cd proto && buf breaking --against '.git#branch=main'
