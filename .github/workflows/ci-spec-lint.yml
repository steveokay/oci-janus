name: CI — spec-lint

# Asserts that CLAUDE.md's claims still match the codebase. See
# tools/spec-lint/README.md for the rule catalogue. New rules are added in
# tools/spec-lint/main.go.
#
# REDESIGN-001 Phase 7.3.

on:
  push:
    paths:
      - "CLAUDE.md"
      - "tools/spec-lint/**"
      - "libs/**"
      - "services/*/migrations/**"
      - "services/*/cmd/**"
      - "services/audit/internal/eventconsumer/**"
      # Rule #5 reads services/audit/internal/repository/repository.go and
      # rule #8 reads services/auth/internal/service/keyring.go; trigger
      # spec-lint when either subtree changes so the rule actually re-runs
      # against the drift it's meant to catch. qa-agent flagged this gap.
      - "services/*/internal/repository/**"
      - "services/*/internal/service/**"
      - ".github/workflows/ci-spec-lint.yml"
  pull_request:
    paths:
      - "CLAUDE.md"
      - "tools/spec-lint/**"
      - "libs/**"
      - "services/*/migrations/**"
      - "services/*/cmd/**"
      - "services/audit/internal/eventconsumer/**"
      - "services/*/internal/repository/**"
      - "services/*/internal/service/**"
      - ".github/workflows/ci-spec-lint.yml"

jobs:
  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - name: Vet spec-lint
        # Cheap regression guard so the tool itself doesn't rot. Catches
        # obvious mistakes (unused vars, format-string typos, etc) before
        # the actual rules run. Per code-review-agent feedback on the
        # initial 7.3 review.
        working-directory: tools/spec-lint
        run: go vet ./...
      - name: Build spec-lint
        working-directory: tools/spec-lint
        run: go build -o spec-lint .
      - name: Run spec-lint
        run: ./tools/spec-lint/spec-lint .
