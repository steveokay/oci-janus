name: CI — gateway

on:
  push:
    paths: ["services/gateway/**", "libs/**", "proto/gateway/**"]
  pull_request:
    paths: ["services/gateway/**", "libs/**", "proto/gateway/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/gateway
          config: ../../.golangci.yml
          # Pin to use the Go toolchain installed by setup-go (1.25.7).
          # The action's bundled golangci-lint binary trails the codebase's
          # required toolchain; install-mode: goinstall builds it from source
          # with the toolchain setup-go just installed.
          version: latest
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/gateway && go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/gateway && make build
      - name: Build Docker image
        run: |
          docker build             --build-arg SERVICE=gateway             -f services/gateway/Dockerfile             -t ghcr.io/steveokay/oci-janus/gateway:${{ github.sha }}             .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/steveokay/oci-janus/gateway:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL
