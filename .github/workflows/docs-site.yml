# Builds the MkDocs documentation site (FUT-076) and publishes it to GitHub
# Pages on merge to main. Pull requests build the site as a check but do not
# deploy, so a broken docs change is caught before it lands.
#
# One-time repo setting required: Settings → Pages → Build and deployment →
# Source = "GitHub Actions". Without it the deploy job cannot publish.
name: docs-site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs-site.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

# Least-privilege token; the deploy job needs pages + id-token to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish.
concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install docs toolchain
        run: pip install -r requirements-docs.txt
      - name: Build site
        run: mkdocs build --site-dir _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    # Publish on merges to main and manual runs (workflow_dispatch) — but never
    # on PRs, which validate the build only. Gating on "not pull_request" (rather
    # than "== push") is what lets a manual re-publish actually deploy.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
