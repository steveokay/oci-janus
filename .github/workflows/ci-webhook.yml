name: CI — webhook

on:
  push:
    paths: ["services/webhook/**", "libs/**", "proto/webhook/**"]
  pull_request:
    paths: ["services/webhook/**", "libs/**", "proto/webhook/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    # Lint backlog (REM-014) is still being chipped through. Non-blocking
    # so individual cleanups land per-PR without blocking unrelated work.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/webhook
          config: ../../.golangci.yml
          # Pin to use the Go toolchain installed by setup-go (1.25.7).
          # The action's bundled golangci-lint binary trails the codebase's
          # required toolchain; install-mode: goinstall builds it from source
          # with the toolchain setup-go just installed.
          version: latest
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/webhook && go test -race ./...

  security:
    runs-on: ubuntu-latest
    # govulncheck currently flags stdlib CVEs in net/http + crypto/x509
    # whose patches require a Go runtime bump (tracked as REM-016). Stage
    # is non-blocking until the bump lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd services/webhook && govulncheck ./... || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/webhook && make build
      - name: Build Docker image
        run: |
          docker build             --build-arg SERVICE=webhook             -f services/webhook/Dockerfile             -t ghcr.io/steveokay/oci-janus/webhook:${{ github.sha }}             .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/steveokay/oci-janus/webhook:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL
