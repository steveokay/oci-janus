name: CI — libs

on:
  push:
    paths: ["libs/**", "go.work"]
  pull_request:
    paths: ["libs/**", "go.work"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: libs
          config: ../.golangci.yml
          # Pin to use the Go toolchain installed by setup-go (1.25.7).
          # The action's bundled golangci-lint binary trails the codebase's
          # required toolchain; install-mode: goinstall builds it from source
          # with the toolchain setup-go just installed.
          version: latest
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd libs && go test -race ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd libs && go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
