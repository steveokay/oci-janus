name: CI — scanner

on:
  push:
    paths: ["services/scanner/**", "libs/**", "proto/scanner/**"]
  pull_request:
    paths: ["services/scanner/**", "libs/**", "proto/scanner/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/scanner
          config: ../../.golangci.yml
          # Pin to use the Go toolchain installed by setup-go (1.25.7).
          # The action's bundled golangci-lint binary trails the codebase's
          # required toolchain; install-mode: goinstall builds it from source
          # with the toolchain setup-go just installed.
          version: latest
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/scanner && go test -race ./...

  security:
    runs-on: ubuntu-latest
    # govulncheck currently flags stdlib CVEs in net/http + crypto/x509
    # whose patches require a Go runtime bump (tracked as REM-016). Stage
    # is non-blocking until the bump lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd services/scanner && govulncheck ./... || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/scanner && make build
      - name: Build Docker image
        run: |
          docker build             --build-arg SERVICE=scanner             -f services/scanner/Dockerfile             -t ghcr.io/steveokay/oci-janus/scanner:${{ github.sha }}             .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/steveokay/oci-janus/scanner:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL
          # trivyignores file is a tab-separated list of CVE-IDs known to
          # have no upstream fix (perl-base in debian:12-slim base layer).
          # Tracked under REM-014 follow-up to revisit the Debian-slim →
          # distroless audit.
          trivyignores: services/scanner/.trivyignore
