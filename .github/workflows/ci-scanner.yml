name: CI — scanner

on:
  push:
    paths: ["services/scanner/**", "libs/**", "proto/scanner/**"]
  pull_request:
    paths: ["services/scanner/**", "libs/**", "proto/scanner/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/scanner
          config: ../../.golangci.yml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - run: cd services/scanner && go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - run: cd services/scanner && make build
      - name: Build Docker image
        run: |
          docker build             --build-arg SERVICE=scanner             -f services/scanner/Dockerfile             -t ghcr.io/steveokay/oci-janus/scanner:${{ github.sha }}             .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/steveokay/oci-janus/scanner:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL
