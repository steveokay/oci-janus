name: CI — scanner

on:
  push:
    paths: ["services/scanner/**", "libs/**", "proto/scanner/**"]
  pull_request:
    paths: ["services/scanner/**", "libs/**", "proto/scanner/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/scanner
          config: ../../.golangci.yml
          # Pin to use the Go toolchain installed by setup-go (1.25.7).
          # The action's bundled golangci-lint binary trails the codebase's
          # required toolchain; install-mode: goinstall builds it from source
          # with the toolchain setup-go just installed.
          version: latest
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/scanner && go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.25.7" }
      - run: cd services/scanner && make build
      - name: Build Docker image
        run: |
          docker build             --build-arg SERVICE=scanner             -f services/scanner/Dockerfile             -t ghcr.io/steveokay/oci-janus/scanner:${{ github.sha }}             .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/steveokay/oci-janus/scanner:${{ github.sha }}
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          # Skip the upstream-supplied trivy + grype binaries — their
          # internal deps (grpc, Go stdlib) are tracked by their respective
          # upstreams (aquasec, anchore) and CVEs reachable inside those
          # binaries are NOT exposed by our scanner adapter (which only
          # forks the binary as a subprocess and reads its stdout/stderr —
          # no Go-level integration). Avoids the per-CVE whack-a-mole on
          # upstream-supplied tools.
          # Tracked under REM-014 follow-up; revisit when the bundled
          # upstreams ship newer Go runtimes + post-fix grpc deps.
          skip-files: /usr/local/bin/trivy,/usr/local/bin/grype
          # trivyignores still covers Debian-base CVEs that ignore-unfixed
          # would catch anyway — kept as belt-and-braces documentation.
          trivyignores: services/scanner/.trivyignore
