# GitHub Sponsors funding config — surfaces a "Sponsor" button on the
# repository page. See https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository
#
# `github` is a list of GitHub usernames (no @ prefix). Up to 4 entries.
# Add other platforms (`patreon`, `open_collective`, `ko_fi`, `buy_me_a_coffee`)
# if you set them up later — see the link above for the full schema.

github: [steveokay]
# patreon: <username>
# open_collective: <slug>
# ko_fi: <slug>
# tidelift: <package>
# community_bridge: <project-name>
# liberapay: <slug>
# issuehunt: <username>
# otechie: <username>
# lfx_crowdfunding: <project-name>
# custom: ["https://example.com/donate"]
