run:
  timeout: 5m
  # Bumped 2026-06-28 alongside the Go 1.25.7 toolchain rollout. Previously
  # pinned to 1.23, which caused golangci-lint to mis-typecheck 1.25 features.
  go: "1.25"
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - gosec
    - noctx
    - bodyclose
    - sqlclosecheck
    - nilerr
    # exhaustive — even with `default-signifies-exhaustive: true` it still
    # flags switches that legitimately omit branches with a default. The
    # codebase has several deliberate omissions (e.g. SAML provider type
    # in OAuth-only paths). Disabled until/unless we audit them all.
    # - exhaustive
    - unparam
    - dupl
    # godot — requires every comment to end in a period. Real bugs it catches:
    # zero. Noise it generates: every block-level comment in the codebase.
    # Disabled until/unless we run a one-time `gofumpt` style sweep.
    # - godot

linters-settings:
  goimports:
    local-prefixes: github.com/steveokay/oci-janus
  gosec:
    excludes:
      - G104  # errors unhandled — caught by errcheck
      # G115 (integer overflow conversion int -> int32/uint32) is a frequent
      # false-positive across services where the source values are
      # structurally bounded (page sizes capped by validation, time.Since
      # millis, etc.). Excluded globally; real overflow risks should be
      # caught by code review. Tracked as REM-014 if/when we want to
      # re-audit the call sites.
      - G115
      # G306 (file write permissions 0600 or less) trips on the scanner
      # report writer which writes to a tempdir owned by the service.
      # Tracked as REM-014; not a security risk in the current deployment
      # model where the tempdir is service-private.
      - G306
  gocritic:
    enabled-tags:
      - diagnostic
    # Drop `style` and `performance` tag groups — they fire on hugeParam
    # (suggests passing structs by pointer; mostly noise on proto
    # generated types). The diagnostic tag still surfaces actual bugs.
    disabled-checks:
      # exitAfterDefer fires on `defer stop(); ...; os.Exit(1)` in each
      # service's main.go. The pattern is intentional — failing fast on
      # startup errors is preferred over a graceful drain, and the
      # signal-handler stop() runs only when SIGINT/SIGTERM is received.
      - exitAfterDefer
      # whyNoLint demands a comment explaining every //nolint directive;
      # ours are deliberately terse and tracked elsewhere.
      - whyNoLint
  exhaustive:
    # The codebase deliberately uses partial switches over gRPC codes
    # in error mapping, falling back to `default:`. Tell exhaustive to
    # treat a default case as full coverage; without this, every
    # `MapDBError`-style switch is flagged.
    default-signifies-exhaustive: true
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - dupl
        # Test files frequently declare fakes/helpers that aren't all
        # used by every individual test; the `unused` linter doesn't
        # account for cross-test references and creates noise.
        - unused
        # gocritic hugeParam / paramTypeCombine fire on table-driven
        # test cases that pass structs.
        - gocritic
        # noctx demands every http.Get / http.NewRequest call go through
        # a context-bearing variant. Real handlers do; test helpers
        # short-circuit through bare http.Get for brevity.
        - noctx
        # bodyclose flags test helpers that use defer body.Close via a
        # wrapper or accept partial closure as a fixture's responsibility.
        # Real handlers do close bodies; tests don't gain reliability by
        # mirroring the production rigor.
        - bodyclose
        # govet's copylocks fires on protobuf-generated structs that
        # contain sync.Mutex for internal state. Production code avoids
        # accidental copies via pointers; tests copy fixtures freely.
        - govet
        # unparam complains when test-only helpers always receive the
        # same arg (e.g. seedRepo(tenantID = "tenant-test")). Correct in
        # production code; noise in fixtures where call-site uniformity
        # is the point.
        - unparam
        # staticcheck SA9003 (empty branch) fires on placeholder branches
        # in table-driven tests. Disable staticcheck on tests entirely
        # rather than trying to allow-list specific checks.
        - staticcheck
    - path: internal/testutil
      linters:
        - gosec
        - unused
        - noctx
        - unparam
        - staticcheck
  max-same-issues: 5
