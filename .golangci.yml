run:
  timeout: 5m
  go: "1.23"
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - gosec
    - noctx
    - bodyclose
    - sqlclosecheck
    - nilerr
    - exhaustive
    - unparam
    - dupl
    - godot

linters-settings:
  goimports:
    local-prefixes: github.com/steveokay/oci-janus
  gosec:
    excludes:
      - G104  # errors unhandled — caught by errcheck
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - dupl
    - path: internal/testutil
      linters:
        - gosec
  max-same-issues: 5
