run:
  timeout: 5m
  # Bumped 2026-06-28 alongside the Go 1.25.7 toolchain rollout. Previously
  # pinned to 1.23, which caused golangci-lint to mis-typecheck 1.25 features.
  go: "1.25"
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - gosec
    - noctx
    - bodyclose
    - sqlclosecheck
    - nilerr
    - exhaustive
    - unparam
    - dupl
    - godot

linters-settings:
  goimports:
    local-prefixes: github.com/steveokay/oci-janus
  gosec:
    excludes:
      - G104  # errors unhandled — caught by errcheck
      # G115 (integer overflow conversion int -> int32/uint32) is a frequent
      # false-positive across services where the source values are
      # structurally bounded (page sizes capped by validation, time.Since
      # millis, etc.). Excluded globally; real overflow risks should be
      # caught by code review. Tracked as REM-014 if/when we want to
      # re-audit the call sites.
      - G115
      # G306 (file write permissions 0600 or less) trips on the scanner
      # report writer which writes to a tempdir owned by the service.
      # Tracked as REM-014; not a security risk in the current deployment
      # model where the tempdir is service-private.
      - G306
  gocritic:
    enabled-tags:
      - diagnostic
    # Drop `style` and `performance` tag groups — they fire on hugeParam
    # (suggests passing structs by pointer; mostly noise on proto
    # generated types). The diagnostic tag still surfaces actual bugs.
    disabled-checks:
      # exitAfterDefer fires on `defer stop(); ...; os.Exit(1)` in each
      # service's main.go. The pattern is intentional — failing fast on
      # startup errors is preferred over a graceful drain, and the
      # signal-handler stop() runs only when SIGINT/SIGTERM is received.
      - exitAfterDefer
      # whyNoLint demands a comment explaining every //nolint directive;
      # ours are deliberately terse and tracked elsewhere.
      - whyNoLint
  exhaustive:
    # The codebase deliberately uses partial switches over gRPC codes
    # in error mapping, falling back to `default:`. Tell exhaustive to
    # treat a default case as full coverage; without this, every
    # `MapDBError`-style switch is flagged.
    default-signifies-exhaustive: true
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - dupl
        # Test files frequently declare fakes/helpers that aren't all
        # used by every individual test; the `unused` linter doesn't
        # account for cross-test references and creates noise.
        - unused
        # gocritic hugeParam / paramTypeCombine fire on table-driven
        # test cases that pass structs.
        - gocritic
    - path: internal/testutil
      linters:
        - gosec
        - unused
  max-same-issues: 5
