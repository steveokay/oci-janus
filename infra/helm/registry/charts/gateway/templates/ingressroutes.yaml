# Wildcard platform domain — routes *.registry.example.com
# Tenant is resolved from subdomain by registry-tenant gRPC lookup (cached in Redis).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: registry-wildcard
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    # OCI Distribution Spec — /v2/* → registry-core
    - match: HostRegexp(`^[a-z0-9-]+\.{{ .Values.platformDomain }}$`) && PathPrefix(`/v2/`)
      kind: Rule
      middlewares:
        - name: security-headers
        - name: strip-internal-headers
        - name: rate-limit
      services:
        - name: registry-core
          port: 8080

    # Pull-through proxy cache — /v2/cache/* → registry-proxy
    - match: HostRegexp(`^[a-z0-9-]+\.{{ .Values.platformDomain }}$`) && PathPrefix(`/v2/cache/`)
      kind: Rule
      priority: 20   # higher priority than the /v2/ rule above
      middlewares:
        - name: security-headers
        - name: strip-internal-headers
        - name: rate-limit
      services:
        - name: registry-proxy
          port: 8080

    # Auth endpoints — /auth/* and /.well-known/* → registry-auth
    - match: HostRegexp(`^[a-z0-9-]+\.{{ .Values.platformDomain }}$`) && (PathPrefix(`/auth/`) || PathPrefix(`/.well-known/`))
      kind: Rule
      middlewares:
        - name: security-headers
        - name: strip-internal-headers
        - name: rate-limit
      services:
        - name: registry-auth
          port: 8080

    # Management API — /api/v1/* → registry-auth (user/apikey management)
    - match: HostRegexp(`^[a-z0-9-]+\.{{ .Values.platformDomain }}$`) && PathPrefix(`/api/v1/`)
      kind: Rule
      middlewares:
        - name: security-headers
        - name: strip-internal-headers
        - name: rate-limit
      services:
        - name: registry-auth
          port: 8080

  tls:
    certResolver: letsencrypt
    domains:
      - main: "*.{{ .Values.platformDomain }}"

---
# HTTP → HTTPS redirect for platform domain
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: registry-http-redirect
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: HostRegexp(`^[a-z0-9-]+\.{{ .Values.platformDomain }}$`)
      kind: Rule
      middlewares:
        - name: https-only
      services:
        - name: registry-core
          port: 8080   # never reached due to redirect middleware
