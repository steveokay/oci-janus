apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scanner.fullname" . }}
  labels:
    {{- include "scanner.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "scanner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scanner.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "scanner.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "scanner.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- with .Values.global }}
            - name: OTEL_EXPORTER
              value: {{ .otel.exporter | quote }}
            - name: OTEL_ENDPOINT
              value: {{ .otel.endpoint | quote }}
            - name: OTEL_ENVIRONMENT
              value: {{ .otel.environment | quote }}
            - name: OTEL_SAMPLING_RATE
              value: {{ .otel.samplingRate | quote }}
            {{- end }}
            {{- if .Values.trivyEngine.enabled }}
            - name: TRIVY_ENGINE_URL
              value: "http://localhost:{{ .Values.trivyEngine.httpPort }}"
            - name: SCANNER_SCAN_WORK_DIR
              value: "/scan-work"
            {{- end }}
            {{- if .Values.grypeEngine.enabled }}
            - name: GRYPE_ENGINE_URL
              value: "http://localhost:{{ .Values.grypeEngine.httpPort }}"
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          livenessProbe:
            grpc:
              port: {{ .Values.service.grpcPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- if .Values.trivyEngine.enabled }}
          volumeMounts:
            - name: scan-work
              mountPath: /scan-work
          {{- end }}
        {{- if .Values.trivyEngine.enabled }}
        - name: trivy-engine
          image: "{{ .Values.trivyEngine.image.repository }}:{{ .Values.trivyEngine.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ENGINE_NAME
              value: trivy
            - name: ENGINE_HTTP_ADDR
              value: ":{{ .Values.trivyEngine.httpPort }}"
          ports:
            - name: engine
              containerPort: {{ .Values.trivyEngine.httpPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: engine
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: scan-work
              mountPath: /scan-work
              readOnly: true
            - name: engine-cache
              mountPath: /engine-cache
          resources:
            {{- toYaml .Values.trivyEngine.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        {{- end }}
        {{- if .Values.grypeEngine.enabled }}
        - name: grype-engine
          image: "{{ .Values.grypeEngine.image.repository }}:{{ .Values.grypeEngine.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ENGINE_NAME
              value: grype
            - name: ENGINE_HTTP_ADDR
              value: ":{{ .Values.grypeEngine.httpPort }}"
          ports:
            - name: engine-grype
              containerPort: {{ .Values.grypeEngine.httpPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.grypeEngine.httpPort }}
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: scan-work
              mountPath: /scan-work
              readOnly: true
            - name: grype-engine-cache
              mountPath: /engine-cache
          resources:
            {{- toYaml .Values.grypeEngine.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        {{- end }}
      {{- if or .Values.trivyEngine.enabled .Values.grypeEngine.enabled }}
      volumes:
        - name: scan-work
          emptyDir: {}
        {{- end }}
      {{- if .Values.trivyEngine.enabled }}
        - name: engine-cache
          emptyDir: {}
      {{- end }}
      {{- if .Values.grypeEngine.enabled }}
        - name: grype-engine-cache
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
