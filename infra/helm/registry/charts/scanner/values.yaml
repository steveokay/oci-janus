replicaCount: 2

image:
  repository: ghcr.io/steveokay/registry-scanner
  pullPolicy: IfNotPresent
  tag: ""

service:
  httpPort: 8080
  grpcPort: 50051

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""

secretName: registry-scanner-secrets

env:
  LOG_LEVEL: info
  LOG_FORMAT: json
  GRPC_ADDR: ":50051"
  HTTP_ADDR: ":8080"
  OTEL_SERVICE_NAME: registry-scanner

nodeSelector: {}
tolerations: []
affinity: {}

# trivyEngine runs as a sidecar container in each scanner pod (engine
# decoupling). Bumping the engine = bump image.tag here + redeploy; the
# scanner image is untouched. In prod, pin image.tag by digest.
trivyEngine:
  enabled: true
  image:
    repository: ghcr.io/steveokay/oci-janus/trivy-engine
    tag: "0.71.2"
  httpPort: 8085
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# grypeEngine mirrors trivyEngine (Phase 2) but on a DISTINCT port — both
# sidecars share the pod's network namespace, so they cannot both bind 8085.
grypeEngine:
  enabled: true
  image:
    repository: ghcr.io/steveokay/oci-janus/grype-engine
    tag: "0.93.0"
  httpPort: 8086
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
