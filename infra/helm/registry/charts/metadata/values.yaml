replicaCount: 2

image:
  repository: ghcr.io/steveokay/registry-metadata
  pullPolicy: IfNotPresent
  tag: ""

service:
  httpPort: 8080
  grpcPort: 50051

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""

secretName: registry-metadata-secrets

env:
  LOG_LEVEL: info
  LOG_FORMAT: json
  GRPC_ADDR: ":50051"
  HTTP_ADDR: ":8080"
  OTEL_SERVICE_NAME: registry-metadata

nodeSelector: {}
tolerations: []
affinity: {}
