apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "storage.fullname" . }}
  labels:
    {{- include "storage.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "storage.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: core
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: proxy
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: scanner
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gc
      ports:
        - port: {{ .Values.service.grpcPort }}
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Redis
    - ports:
        - port: 6379
    # Internal services (gRPC to auth, storage, metadata, etc.)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
    # Object storage (MinIO/S3/GCS/Azure)
    - ports:
        - port: 9000
        - port: 443
        - port: 80
