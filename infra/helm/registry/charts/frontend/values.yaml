replicaCount: 2

image:
  repository: ghcr.io/steveokay/registry-frontend
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

# The SPA is served by nginx on :8080 (see frontend/nginx.conf). It is a
# static bundle — no secrets, no backend env. The dashboard's tenant id and
# API base are baked into the JS at image *build* time (Vite inlines
# import.meta.env.VITE_* during `npm run build`), so per-environment config
# means building a per-environment image, not overriding env here.
service:
  httpPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}
