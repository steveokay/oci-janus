# Default values for the registry umbrella chart.
# Do not place secrets here. Use SecretProviderClass / External Secrets Operator.

global:
  image:
    registry: ghcr.io/steveokay
    tag: latest
    pullPolicy: IfNotPresent

  mtls:
    enabled: true
    caCertSecret: registry-mtls-ca

  otel:
    exporter: jaeger
    endpoint: jaeger-collector:4317
    environment: production
    samplingRate: "1.0"

auth:
  replicaCount: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

core:
  replicaCount: 3
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

metadata:
  replicaCount: 2
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

storage:
  replicaCount: 2
  driver: minio
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

scanner:
  replicaCount: 2
  workerCount: 4
  jobTimeoutSeconds: 600
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: 2000m, memory: 2Gi }

webhook:
  replicaCount: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

gc:
  schedule: "0 2 * * *"  # nightly at 02:00 UTC
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

# registry-management — REST BFF for the dashboard. HTTP-only. The two
# per-environment knobs (there are no secrets here) MUST be set in an overlay:
#   env.CORS_ALLOWED_ORIGIN — the dashboard's public origin
#   env.PLATFORM_HOST       — the public host used to build absolute links
# Every *_GRPC_ADDR defaults to the in-cluster service DNS in the subchart's
# own values.yaml; clear one to disable that route family (404 "route disabled").
management:
  replicaCount: 2
  env:
    CORS_ALLOWED_ORIGIN: ""
    PLATFORM_HOST: ""
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

# registry-frontend — nginx serving the built dashboard SPA. Static bundle,
# no secrets. Per-environment config (tenant id, API base) is baked into the
# image at build time, so overriding it means building a per-env image.
frontend:
  replicaCount: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

# Automated DR. Disabled by default so review / dev environments don't
# require a backup bucket. Production overlays (values.prod.yaml) must set
# `enabled: true` and provision the secrets referenced by the subchart.
# See infra/runbooks/disaster-recovery.md for the full operator checklist.
backup:
  enabled: false
