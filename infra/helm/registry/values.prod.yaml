# Production overrides — no secrets here.
# Secrets are injected via External Secrets Operator → Vault / AWS Secrets Manager.

global:
  image:
    registry: ghcr.io/steveokay
    pullPolicy: Always   # always pull on pod restart in prod
  otel:
    exporter: tempo
    endpoint: tempo-distributor.monitoring.svc.cluster.local:4317
    environment: production
    samplingRate: "0.1"  # 10% sampling in production

gateway:
  platformDomain: registry.yourdomain.com
  tls:
    acmeEmail: ops@yourdomain.com
    staging: false
  rateLimit:
    average: 200
    burst: 400

auth:
  replicaCount: 3
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

core:
  replicaCount: 5
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: 2000m, memory: 1Gi }

metadata:
  replicaCount: 3
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: 2000m, memory: 1Gi }

storage:
  replicaCount: 3
  driver: s3
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

proxy:
  replicaCount: 2
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

scanner:
  replicaCount: 4
  workerCount: 8
  resources:
    requests: { cpu: 1000m, memory: 1Gi }
    limits:   { cpu: 4000m, memory: 4Gi }

webhook:
  replicaCount: 3

audit:
  replicaCount: 2

gc:
  schedule: "0 3 * * *"   # 03:00 UTC nightly
  gcMode: full

tenant:
  replicaCount: 2

# Automated DR. See infra/runbooks/disaster-recovery.md for the operator
# prerequisites (separate-account backup bucket, ESO secrets, Vault snapshot
# policy + token, RabbitMQ admin user). The schedules below are sane defaults
# for a single-region production deployment; multi-region deployments should
# stagger across regions so dump traffic doesn't all converge on PG primary.
backup:
  enabled: true
  image:
    tag: "0.1.0"
  target:
    # Update these to match your production backup bucket. The bucket MUST
    # live in a different cloud account from the data buckets — see §5 of
    # the DR runbook for why.
    bucket: registry-backups-prod
    region: us-east-1
    endpointURL: ""          # blank = real AWS S3
    sseAlgorithm: AES256
    forcePathStyle: false
    environment: production
