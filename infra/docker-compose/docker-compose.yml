version: "3.9"

# Full local dev stack: infrastructure + all implemented application services.
# Usage:
#   cp .env.example .env          # fill in secrets
#   cp ../../services/auth/.env.example ../../services/auth/.env  # fill in JWT keys
#   docker-compose up -d
#
# Traefik dashboard: http://localhost:8888
# Jaeger UI:         http://localhost:16686
# RabbitMQ UI:       http://localhost:15672  (registry / registry)
# MinIO console:     http://localhost:9001   (minioadmin / minioadmin)
# Vault UI:          http://localhost:8200   (token: dev-root-token)

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registry}
      POSTGRES_DB: registry_auth
      # init-multi-db.sh reads this to create additional databases
      POSTGRES_MULTIPLE_DATABASES: registry_metadata,registry_tenant,registry_proxy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "5432:5432"
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-registry}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-registry}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - registry

  vault:
    image: hashicorp/vault:1.17
    command: server -dev -dev-root-token-id=dev-root-token
    environment:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_LOG_LEVEL: warn
    ports:
      - "8200:8200"
    networks:
      - registry
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    volumes:
      - ./vault/init.sh:/init.sh:ro
    command: sh /init.sh
    networks:
      - registry
    restart: "no"

  # ── Application services ────────────────────────────────────────────────────

  registry-auth:
    build:
      context: ../../
      dockerfile: services/auth/Dockerfile
      args:
        SERVICE: auth
    env_file:
      - ../../services/auth/.env
    environment:
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_auth?sslmode=require
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER: jaeger
      OTEL_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: development
    ports:
      - "8080:8080"    # HTTP: /auth/token, /api/v1/*, /.well-known/jwks.json
      - "50051:50051"  # gRPC: AuthService (internal)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  registry-storage:
    build:
      context: ../../
      dockerfile: services/storage/Dockerfile
      args:
        SERVICE: storage
    env_file:
      - ../../services/storage/.env
    environment:
      STORAGE_DRIVER: minio
      STORAGE_MINIO_ENDPOINT: minio:9000
      STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_MINIO_BUCKET: registry
      STORAGE_MINIO_USE_SSL: "false"
      OTEL_EXPORTER: jaeger
      OTEL_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: development
    ports:
      - "8082:8080"    # HTTP: /healthz, /metrics
      - "50053:50051"  # gRPC: StorageService (internal)
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  registry-metadata:
    build:
      context: ../../
      dockerfile: services/metadata/Dockerfile
      args:
        SERVICE: metadata
    env_file:
      - ../../services/metadata/.env
    environment:
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_metadata?sslmode=require
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER: jaeger
      OTEL_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: development
    ports:
      - "8083:8080"    # HTTP: /healthz, /metrics
      - "50054:50051"  # gRPC: MetadataService (internal)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  registry-core:
    build:
      context: ../../
      dockerfile: services/core/Dockerfile
      args:
        SERVICE: core
    env_file:
      - ../../services/core/.env
    environment:
      AUTH_GRPC_ADDR: registry-auth:50051
      METADATA_GRPC_ADDR: registry-metadata:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      OTEL_EXPORTER: jaeger
      OTEL_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: development
    ports:
      - "8081:8080"    # HTTP: /v2/ OCI Distribution Spec
      - "50052:50051"  # gRPC: health check
    depends_on:
      registry-auth:
        condition: service_healthy
      registry-metadata:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  registry-proxy:
    build:
      context: ../../
      dockerfile: services/proxy/Dockerfile
      args:
        SERVICE: proxy
    env_file:
      - ../../services/proxy/.env
    environment:
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_proxy?sslmode=require
      REDIS_ADDR: redis:6379
      AUTH_GRPC_ADDR: registry-auth:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      CREDENTIAL_KEY_HEX: ${PROXY_CREDENTIAL_KEY_HEX}
      OTEL_EXPORTER: jaeger
      OTEL_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: development
    ports:
      - "8084:8080"    # HTTP: /v2/cache/* pull-through proxy
      - "50055:50051"  # gRPC: ProxyService (internal)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry-auth:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

networks:
  registry:
    name: registry
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
