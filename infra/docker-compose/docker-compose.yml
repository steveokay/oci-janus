version: "3.9"

# Full local dev stack — all infrastructure and registry services.
#
# Quick start:
#   cd infra/docker-compose
#   cp .env.example .env          # fill in SIGNER keys + CREDENTIAL_KEY_HEX values
#   docker compose up -d
#
# Port map:
#   postgres:           5432
#   redis:              6379
#   rabbitmq:           5672, 15672 (management UI — registry/registry)
#   minio:              9000, 9001 (console — minioadmin/minioadmin)
#   otel-collector:     4317 (OTLP gRPC), 4318 (OTLP HTTP), 8889 (span metrics)
#   prometheus:         9090 (metrics UI + SPM backend)
#   jaeger:             16686 (UI — SPM powered by prometheus)
#   vault:              8200 (token: dev-root-token)
#   registry-gateway:   8443 (HTTP stub, health only)
#   registry-auth:      8080 (HTTP), 50051 (gRPC)
#   registry-core:      8081 (OCI /v2/), 50052 (gRPC health)
#   registry-storage:   8082 (HTTP), 50053 (gRPC)
#   registry-metadata:  8083 (HTTP), 50054 (gRPC)
#   registry-proxy:     8084 (HTTP), 50055 (gRPC)
#   registry-signer:    8086 (HTTP), 50057 (gRPC)
#   registry-webhook:   8087 (HTTP), 50058 (gRPC)
#   registry-audit:     8088 (HTTP), 50059 (gRPC)
#   registry-gc:        8089 (HTTP), 50060 (gRPC)
#   registry-tenant:    8090 (HTTP), 50061 (gRPC)
#   registry-management: 8091 (HTTP — REST/BFF, no gRPC server)
#
# Scanner requires a plugin binary; start it separately:
#   docker compose --profile scanner up -d registry-scanner

# ── Reusable fragments ──────────────────────────────────────────────────────

x-otel: &otel
  OTEL_EXPORTER: jaeger
  OTEL_ENDPOINT: otel-collector:4317
  OTEL_ENVIRONMENT: development
  # OTEL_INSECURE=true is required here because the local otel-collector does not
  # present a TLS certificate. This must NOT be set in staging or production
  # environments — remove this line and configure real TLS on the collector.
  OTEL_INSECURE: "true"

x-healthcheck: &healthcheck
  test: ["CMD", "/healthcheck"]
  interval: 10s
  timeout: 5s
  retries: 5

services:

  # ── Dev cert initialiser ──────────────────────────────────────────────────
  # Runs once on first boot; generates self-signed mTLS certs for all services
  # into the certs_data volume. Idempotent — safe to restart.
  cert-init:
    image: alpine:3.20
    volumes:
      - certs_data:/certs
      - ../../scripts:/scripts:ro
    command: sh /scripts/gen-dev-certs.sh
    environment:
      CERTS_DIR: /certs
    networks:
      - registry
    restart: "no"

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: registry
      # WARNING: Default password 'registry' is insecure. Set POSTGRES_PASSWORD in your
      # .env file. Never use the default outside a local-only developer environment.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registry}
      POSTGRES_DB: registry_auth
      # init-multi-db.sh creates additional databases listed here
      POSTGRES_MULTIPLE_DATABASES: registry_metadata,registry_tenant,registry_proxy,registry_webhook,registry_audit
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "5432:5432"
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d registry_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-registry}
      # WARNING: Default password 'registry' is insecure. Set RABBITMQ_DEFAULT_PASS in .env.
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-registry}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      # WARNING: Default password 'minioadmin' is insecure. Set MINIO_ROOT_PASSWORD in .env.
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
      # Must match the `namespace` in otel-collector.yml's prometheus exporter so Jaeger
      # SPM queries registry_calls_total / registry_duration_* instead of bare names.
      PROMETHEUS_QUERY_NAMESPACE: registry
      PROMETHEUS_QUERY_NORMALIZE_CALLS: "true"
      PROMETHEUS_QUERY_NORMALIZE_DURATION: "true"
      # Required for Jaeger 1.55+ to interpret spanmetrics connector output correctly.
      PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR: "true"
    ports:
      - "16686:16686"  # Jaeger UI (SPM tab enabled)
    networks:
      - registry

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC — services send traces here
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus span metrics scrape target
    depends_on:
      - jaeger
    networks:
      - registry
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI + query API
    depends_on:
      - otel-collector
    networks:
      - registry
    restart: unless-stopped

  # WARNING: VAULT_DEV_ROOT_TOKEN defaults to 'dev-root-token' — a well-known credential.
  # Set VAULT_DEV_ROOT_TOKEN in your .env file or environment before running in any
  # non-local environment. Never use the default in CI, staging, or production.
  vault:
    image: hashicorp/vault:1.17
    command: server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
    environment:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      VAULT_LOG_LEVEL: warn
    ports:
      - "8200:8200"
    networks:
      - registry
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      # Must match the token set in the vault service above.
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
    volumes:
      - ./vault/init.sh:/init.sh:ro
    command: sh /init.sh
    networks:
      - registry
    restart: "no"

  # ── Application services ──────────────────────────────────────────────────

  registry-gateway:
    build:
      context: ../../
      dockerfile: services/gateway/Dockerfile
      args:
        SERVICE: gateway
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-gateway
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/gateway.crt
      MTLS_KEY_PATH: /certs/gateway.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8443:8080"
      - "50062:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-auth:
    build:
      context: ../../
      dockerfile: services/auth/Dockerfile
      args:
        SERVICE: auth
    env_file:
      - ../../services/auth/.env
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-auth
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_auth?sslmode=prefer
      REDIS_ADDR: redis:6379
      DEV_DEFAULT_TENANT_ID: "98dbe36b-ef28-4903-b25c-bff1b2921c9e"
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/auth.crt
      MTLS_KEY_PATH: /certs/auth.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

  registry-storage:
    build:
      context: ../../
      dockerfile: services/storage/Dockerfile
      args:
        SERVICE: storage
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-storage
      STORAGE_DRIVER: minio
      STORAGE_MINIO_ENDPOINT: minio:9000
      STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_MINIO_BUCKET: registry
      STORAGE_MINIO_USE_SSL: "false"
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/storage.crt
      MTLS_KEY_PATH: /certs/storage.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8082:8080"
      - "50053:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-metadata:
    build:
      context: ../../
      dockerfile: services/metadata/Dockerfile
      args:
        SERVICE: metadata
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-metadata
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_metadata?sslmode=prefer
      REDIS_ADDR: redis:6379
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/metadata.crt
      MTLS_KEY_PATH: /certs/metadata.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8083:8080"
      - "50054:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

  registry-core:
    build:
      context: ../../
      dockerfile: services/core/Dockerfile
      args:
        SERVICE: core
    env_file:
      - ../../services/core/.env
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-core
      AUTH_GRPC_ADDR: registry-auth:50051
      # AUTH_REALM must be a URL reachable by the Docker daemon (host-side).
      # Default is the host-facing URL used by `docker login`; tests that
      # operate inside the registry network (e.g. OCI conformance) export
      # AUTH_REALM=http://registry-auth:8080/auth/token before docker compose
      # up to override it temporarily.
      AUTH_REALM: ${AUTH_REALM:-http://localhost:8080/auth/token}
      METADATA_GRPC_ADDR: registry-metadata:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/core.crt
      MTLS_KEY_PATH: /certs/core.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8081:8080"
      - "50052:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-auth:
        condition: service_healthy
      registry-metadata:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 20s
    restart: unless-stopped

  registry-proxy:
    build:
      context: ../../
      dockerfile: services/proxy/Dockerfile
      args:
        SERVICE: proxy
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-proxy
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_proxy?sslmode=prefer
      REDIS_ADDR: redis:6379
      AUTH_GRPC_ADDR: registry-auth:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      AUTH_REALM: http://localhost:8080/auth/token
      CREDENTIAL_KEY_HEX: ${PROXY_CREDENTIAL_KEY_HEX}
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/proxy.crt
      MTLS_KEY_PATH: /certs/proxy.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8084:8080"
      - "50055:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry-auth:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

  registry-signer:
    build:
      context: ../../
      dockerfile: services/signer/Dockerfile
      args:
        SERVICE: signer
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-signer
      SIGNER_KEY_BACKEND: env
      SIGNER_COSIGN_PRIVATE_KEY: ${SIGNER_COSIGN_PRIVATE_KEY}
      SIGNER_COSIGN_PUBLIC_KEY: ${SIGNER_COSIGN_PUBLIC_KEY}
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/signer.crt
      MTLS_KEY_PATH: /certs/signer.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8086:8080"
      - "50057:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-webhook:
    build:
      context: ../../
      dockerfile: services/webhook/Dockerfile
      args:
        SERVICE: webhook
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-webhook
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_webhook?sslmode=prefer
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      CREDENTIAL_KEY_HEX: ${WEBHOOK_CREDENTIAL_KEY_HEX}
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/webhook.crt
      MTLS_KEY_PATH: /certs/webhook.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8087:8080"
      - "50058:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-audit:
    build:
      context: ../../
      dockerfile: services/audit/Dockerfile
      args:
        SERVICE: audit
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-audit
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_audit?sslmode=prefer
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      TRUSTED_GATEWAY_IP: registry-gateway
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/audit.crt
      MTLS_KEY_PATH: /certs/audit.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8088:8080"
      - "50059:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-gc:
    build:
      context: ../../
      dockerfile: services/gc/Dockerfile
      args:
        SERVICE: gc
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-gc
      METADATA_GRPC_ADDR: registry-metadata:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      GC_MODE: full
      GC_RUN_INTERVAL_HOURS: "24"
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/gc.crt
      MTLS_KEY_PATH: /certs/gc.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8089:8080"
      - "50060:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-metadata:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-tenant:
    build:
      context: ../../
      dockerfile: services/tenant/Dockerfile
      args:
        SERVICE: tenant
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-tenant
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_tenant?sslmode=prefer
      REDIS_ADDR: redis:6379
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/tenant.crt
      MTLS_KEY_PATH: /certs/tenant.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8090:8080"
      - "50061:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-management:
    build:
      context: ../../
      dockerfile: services/management/Dockerfile
      args:
        SERVICE: management
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-management
      HTTP_ADDR: ":8085"
      AUTH_GRPC_ADDR: registry-auth:50051
      METADATA_GRPC_ADDR: registry-metadata:50051
      AUDIT_GRPC_ADDR: registry-audit:50051
      # TENANT_GRPC_ADDR enables the super-admin /api/v1/admin/tenants routes
      # (create/list/delete tenants). Empty disables them with 404. Callers
      # additionally need the platform-admin marker role (admin / org / *).
      TENANT_GRPC_ADDR: registry-tenant:50051
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      # CORS_ALLOWED_ORIGIN: set to the frontend origin in production.
      # Defaults to http://localhost:5173 inside the service for local dev.
      CORS_ALLOWED_ORIGIN: http://localhost:5173
      # PLATFORM_ADMIN_TENANT_ID: tenant whose admin/owner users can call the
      # cross-tenant quota route (PUT /api/v1/admin/tenants/<id>/quota). The dev
      # tenant is the operator tenant locally; production should use a dedicated
      # operator tenant created out of band.
      PLATFORM_ADMIN_TENANT_ID: ${PLATFORM_ADMIN_TENANT_ID:-98dbe36b-ef28-4903-b25c-bff1b2921c9e}
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/management.crt
      MTLS_KEY_PATH: /certs/management.key
      LOG_FORMAT: text
      LOG_LEVEL: info
    volumes:
      - certs_data:/certs:ro
    ports:
      # External 8091 avoids collision with registry-scanner (8085) in the scanner profile.
      - "8091:8085"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-auth:
        condition: service_healthy
      registry-metadata:
        condition: service_healthy
      registry-audit:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8085/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Scanner requires an external plugin binary — not started by default.
  # Set SCANNER_PLUGIN_PATH and SCANNER_PLUGIN_CHECKSUM in .env, then:
  #   docker compose --profile scanner up -d registry-scanner
  registry-scanner:
    build:
      context: ../../
      dockerfile: services/scanner/Dockerfile
      args:
        SERVICE: scanner
    profiles: ["scanner"]
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-scanner
      METADATA_GRPC_ADDR: registry-metadata:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      SCANNER_PLUGIN_PATH: ${SCANNER_PLUGIN_PATH}
      SCANNER_PLUGIN_CHECKSUM: ${SCANNER_PLUGIN_CHECKSUM}
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/scanner.crt
      MTLS_KEY_PATH: /certs/scanner.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8085:8080"
      - "50056:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-metadata:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

networks:
  registry:
    name: registry
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  certs_data:
