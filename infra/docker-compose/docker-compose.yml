version: "3.9"

# Full local dev stack — all infrastructure and registry services.
#
# Quick start:
#   cd infra/docker-compose
#   cp .env.example .env          # fill in SIGNER keys + CREDENTIAL_KEY_HEX values
#   docker compose up -d
#
# Port map:
#   postgres:           5432
#   redis:              6379
#   rabbitmq:           5672, 15672 (management UI — registry/registry)
#   minio:              9000, 9001 (console — minioadmin/minioadmin)
#   otel-collector:     4317 (OTLP gRPC), 4318 (OTLP HTTP), 8889 (span metrics)
#   prometheus:         9090 (metrics UI + SPM backend)
#   jaeger:             16686 (UI — SPM powered by prometheus)
#   vault:              8200 (token: dev-root-token)
#   registry-gateway:   8443 (HTTP stub, health only)
#   registry-auth:      8080 (HTTP), 50051 (gRPC)
#   registry-core:      8081 (OCI /v2/), 50052 (gRPC health)
#   registry-storage:   8082 (HTTP), 50053 (gRPC)
#   registry-metadata:  8083 (HTTP), 50054 (gRPC)
#   registry-proxy:     8084 (HTTP), 50055 (gRPC)
#   registry-signer:    8086 (HTTP), 50057 (gRPC)
#   registry-webhook:   8087 (HTTP), 50058 (gRPC)
#   registry-audit:     8088 (HTTP), 50059 (gRPC)
#   registry-gc:        8089 (HTTP), 50060 (gRPC)
#   registry-tenant:    8090 (HTTP), 50061 (gRPC)
#   registry-management: 8091 (HTTP — REST/BFF, no gRPC server)
#   registry-mcp:       8092 (HTTP — MCP protocol, opt-in via --profile mcp)
#
# Scanner requires a plugin binary; start it separately:
#   docker compose --profile scanner up -d registry-scanner

# ── Reusable fragments ──────────────────────────────────────────────────────

x-otel: &otel
  OTEL_EXPORTER: jaeger
  OTEL_ENDPOINT: otel-collector:4317
  OTEL_ENVIRONMENT: development
  # OTEL_INSECURE=true is required here because the local otel-collector does not
  # present a TLS certificate. This must NOT be set in staging or production
  # environments — remove this line and configure real TLS on the collector.
  OTEL_INSECURE: "true"

x-healthcheck: &healthcheck
  test: ["CMD", "/healthcheck"]
  interval: 10s
  timeout: 5s
  retries: 5

services:

  # ── Dev cert initialiser ──────────────────────────────────────────────────
  # Runs once on first boot; generates self-signed mTLS certs for all services
  # into the certs_data volume. Idempotent — safe to restart.
  cert-init:
    image: alpine:3.20
    volumes:
      - certs_data:/certs
      - ../../scripts:/scripts:ro
    command: sh /scripts/gen-dev-certs.sh
    environment:
      CERTS_DIR: /certs
    networks:
      - registry
    restart: "no"

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: registry
      # WARNING: Default password 'registry' is insecure. Set POSTGRES_PASSWORD in your
      # .env file. Never use the default outside a local-only developer environment.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-registry}
      POSTGRES_DB: registry_auth
      # init-multi-db.sh creates additional databases listed here. Every
      # service that talks to its own DB must appear here so a fresh
      # docker volume comes up complete on first boot. registry_gc was
      # added per Decision #18 (GC needs its own DB for status visibility
      # + async RunNow queue); without it registry-gc crash-loops with
      # `FATAL: database "registry_gc" does not exist`.
      POSTGRES_MULTIPLE_DATABASES: registry_metadata,registry_tenant,registry_proxy,registry_webhook,registry_audit,registry_scanner,registry_gc,registry_signer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "5432:5432"
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d registry_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-registry}
      # WARNING: Default password 'registry' is insecure. Set RABBITMQ_DEFAULT_PASS in .env.
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-registry}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      # WARNING: Default password 'minioadmin' is insecure. Set MINIO_ROOT_PASSWORD in .env.
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - registry
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
      # Must match the `namespace` in otel-collector.yml's prometheus exporter so Jaeger
      # SPM queries registry_calls_total / registry_duration_* instead of bare names.
      PROMETHEUS_QUERY_NAMESPACE: registry
      PROMETHEUS_QUERY_NORMALIZE_CALLS: "true"
      PROMETHEUS_QUERY_NORMALIZE_DURATION: "true"
      # Required for Jaeger 1.55+ to interpret spanmetrics connector output correctly.
      PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR: "true"
    ports:
      - "16686:16686"  # Jaeger UI (SPM tab enabled)
    networks:
      - registry

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC — services send traces here
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus span metrics scrape target
    depends_on:
      - jaeger
    networks:
      - registry
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI + query API
    depends_on:
      - otel-collector
    networks:
      - registry
    restart: unless-stopped

  # WARNING: VAULT_DEV_ROOT_TOKEN defaults to 'dev-root-token' — a well-known credential.
  # Set VAULT_DEV_ROOT_TOKEN in your .env file or environment before running in any
  # non-local environment. Never use the default in CI, staging, or production.
  vault:
    image: hashicorp/vault:1.17
    command: server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
    environment:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      VAULT_LOG_LEVEL: warn
    ports:
      - "8200:8200"
    networks:
      - registry
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      # Must match the token set in the vault service above.
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
    volumes:
      - ./vault/init.sh:/init.sh:ro
    command: sh /init.sh
    networks:
      - registry
    restart: "no"

  # ── Application services ──────────────────────────────────────────────────

  # RED-FU-007 - One-shot bootstrap container that seeds the deployment
  # so Phase 3.4 services can start in single mode.
  #
  # The production runbook seeds the same rows via the `registry-auth bootstrap`
  # CLI (services/auth/internal/bootstrap), which also creates the first admin
  # user (argon2 hash in the auth DB). For the compose dev stack + CI
  # conformance run we only need the *tenant-side* rows so that every
  # Phase 3.4 service's startup tenant.GetDeploymentMetadata(bootstrap_tenant_id)
  # lookup succeeds:
  #
  #   1. tenants row exists (so /api/v1/users tenant_id=... resolves)
  #   2. tenant_policies row exists (FK + scan-on-push default)
  #   3. deployment_metadata.bootstrap_tenant_id is set (Phase 3.4 lookup key)
  #
  # An alpine + psql one-shot is the smallest fix; using the real bootstrap
  # CLI here would require either (a) a sidecar built from the auth image
  # that waits for auth migrations to complete before seeding admin creds, or
  # (b) a cross-module Go import to pull tenant migrations into the auth
  # binary so it can run them itself. Both are larger architectural changes
  # than this PR's scope. `make dev-bootstrap` still works post-stack-up for
  # operators who want the dev admin user.
  registry-bootstrap:
    image: postgres:16-alpine
    environment:
      DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_tenant?sslmode=disable
      BOOTSTRAP_TENANT_ID: "98dbe36b-ef28-4903-b25c-bff1b2921c9e"
      BOOTSTRAP_TENANT_NAME: "Development"
      # Slug must satisfy the slug regex (`^[a-z0-9-]{2,64}$`) and the
      # NOT NULL constraint added by tenant migration 20260620000001.
      BOOTSTRAP_TENANT_SLUG: "development"
    command:
      - sh
      - -ec
      - |
        until psql "$$DSN" -tc "SELECT 1 FROM information_schema.tables WHERE table_name='deployment_metadata'" 2>/dev/null | grep -q 1; do
          echo "waiting for tenant migrations (deployment_metadata table)..."
          sleep 1
        done
        echo "seeding bootstrap_tenant_id=$$BOOTSTRAP_TENANT_ID..."
        psql "$$DSN" -v ON_ERROR_STOP=1 <<SQL
          INSERT INTO tenants (id, name, slug)
            VALUES ('$$BOOTSTRAP_TENANT_ID', '$$BOOTSTRAP_TENANT_NAME', '$$BOOTSTRAP_TENANT_SLUG')
            ON CONFLICT (id) DO NOTHING;
          INSERT INTO tenant_policies (tenant_id)
            VALUES ('$$BOOTSTRAP_TENANT_ID')
            ON CONFLICT (tenant_id) DO NOTHING;
          INSERT INTO deployment_metadata (key, value)
            VALUES ('bootstrap_tenant_id', to_jsonb('$$BOOTSTRAP_TENANT_ID'::text))
            ON CONFLICT (key) DO NOTHING;
        SQL
        echo "RED-FU-007 bootstrap complete - Phase 3.4 services may now start."
    depends_on:
      postgres:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
    networks:
      - registry
    restart: "no"

  registry-gateway:
    build:
      context: ../../
      dockerfile: services/gateway/Dockerfile
      args:
        SERVICE: gateway
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-gateway
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/gateway.crt
      MTLS_KEY_PATH: /certs/gateway.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8443:8080"
      - "50062:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-auth:
    build:
      context: ../../
      dockerfile: services/auth/Dockerfile
      args:
        SERVICE: auth
    env_file:
      - ../../services/auth/.env
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-auth
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_auth?sslmode=prefer
      REDIS_ADDR: redis:6379
      DEV_DEFAULT_TENANT_ID: "98dbe36b-ef28-4903-b25c-bff1b2921c9e"
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/auth.crt
      MTLS_KEY_PATH: /certs/auth.key
      # FE-API-048 FUT-007 — RabbitMQ publisher for SA lifecycle audit
      # events on routing key service_account.lifecycle. Without this,
      # ServiceAccountService falls back to slogAuditEmitter (events
      # are visible in container logs but never reach services/audit's
      # audit_events table).
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      # FE-API-048 FUT-005 — outbound gRPC to registry-audit for the activity
      # facade used by GET /api/v1/access/activity. Reuses the same mTLS
      # material configured above. Optional — without this var the route
      # returns 501 NOT_IMPLEMENTED and the FE activity tab renders empty.
      AUDIT_GRPC_ADDR: registry-audit:50051
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup.
      # Auth dials services/tenant at startup to fetch the deployment's
      # bootstrap_tenant_id and wire libs/middleware/grpc.SingleTenantInjector.
      # Without this, auth fails closed at startup in single mode.
      TENANT_GRPC_ADDR: registry-tenant:50051
      # FUT-001 — CSV of trusted OIDC issuer URL prefixes for federated
      # workload identity. The same allowlist gates trust-create AND
      # token-exchange, so removing an issuer here stops minting on the
      # next exchange even without a DB change. Empty rejects ALL
      # creates and ALL exchanges (fail-closed default). Dev list is
      # the three major CI IdPs so developers can exercise the flow
      # without editing the compose file.
      # SEC-057: the subdomain-lookalike bypass (e.g. gitlab.com.evil.example
      # matching a gitlab.com prefix) is closed in code by issuerAllowed's
      # URL-path-boundary check. Do NOT append trailing slashes here: the
      # real issuer `iss` claims are slash-less (GitHub Actions is exactly
      # `https://token.actions.githubusercontent.com`), and a trailing-slash
      # allowlist entry is a strict prefix of nothing the IdP actually sends,
      # so it would reject every legitimate token.
      OIDC_ALLOWED_ISSUERS: "https://token.actions.githubusercontent.com,https://gitlab.com,https://agent.buildkite.com"
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

  registry-storage:
    build:
      context: ../../
      dockerfile: services/storage/Dockerfile
      args:
        SERVICE: storage
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-storage
      STORAGE_DRIVER: minio
      STORAGE_MINIO_ENDPOINT: minio:9000
      STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_MINIO_BUCKET: registry
      STORAGE_MINIO_USE_SSL: "false"
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/storage.crt
      MTLS_KEY_PATH: /certs/storage.key
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup.
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8082:8080"
      - "50053:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-metadata:
    build:
      context: ../../
      dockerfile: services/metadata/Dockerfile
      args:
        SERVICE: metadata
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-metadata
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_metadata?sslmode=prefer
      REDIS_ADDR: redis:6379
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/metadata.crt
      MTLS_KEY_PATH: /certs/metadata.key
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup
      # (parallel to registry-auth above).
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8083:8080"
      - "50054:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

  registry-core:
    build:
      context: ../../
      dockerfile: services/core/Dockerfile
      args:
        SERVICE: core
    env_file:
      - ../../services/core/.env
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-core
      AUTH_GRPC_ADDR: registry-auth:50051
      # AUTH_REALM must be a URL reachable by the Docker daemon (host-side).
      # Default is the host-facing URL used by `docker login`; tests that
      # operate inside the registry network (e.g. OCI conformance) export
      # AUTH_REALM=http://registry-auth:8080/auth/token before docker compose
      # up to override it temporarily.
      AUTH_REALM: ${AUTH_REALM:-http://localhost:8080/auth/token}
      METADATA_GRPC_ADDR: registry-metadata:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      # SIGNER_GRPC_ADDR (futures.md Tier 1 #3) wires the signed-image
      # admission gate on GetManifest / HeadManifest. Unset → registry-core
      # logs a startup warning and allows all pulls regardless of the
      # repo's require_signature flag (dev-only fail-OPEN). Production
      # always sets this.
      SIGNER_GRPC_ADDR: registry-signer:50051
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/core.crt
      MTLS_KEY_PATH: /certs/core.key
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup
      # (parallel to registry-auth + registry-metadata above).
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8081:8080"
      - "50052:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-auth:
        condition: service_healthy
      registry-metadata:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      registry-signer:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 20s
    restart: unless-stopped

  registry-proxy:
    build:
      context: ../../
      dockerfile: services/proxy/Dockerfile
      args:
        SERVICE: proxy
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-proxy
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_proxy?sslmode=prefer
      REDIS_ADDR: redis:6379
      AUTH_GRPC_ADDR: registry-auth:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      AUTH_REALM: http://localhost:8080/auth/token
      CREDENTIAL_KEY_HEX: ${PROXY_CREDENTIAL_KEY_HEX}
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/proxy.crt
      MTLS_KEY_PATH: /certs/proxy.key
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup.
      # The proxy gRPC server pins every inbound RPC to the tenant returned
      # by registry-tenant's GetDeploymentMetadata at startup. Required
      # when DEPLOYMENT_MODE=single (the platform default).
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8084:8080"
      - "50055:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      registry-auth:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

  registry-signer:
    build:
      context: ../../
      dockerfile: services/signer/Dockerfile
      args:
        SERVICE: signer
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-signer
      SIGNER_KEY_BACKEND: env
      SIGNER_COSIGN_PRIVATE_KEY: ${SIGNER_COSIGN_PRIVATE_KEY}
      SIGNER_COSIGN_PUBLIC_KEY: ${SIGNER_COSIGN_PUBLIC_KEY}
      # FUT-017: signer now owns its own DB for the per-upstream
      # auto-sign policies + consumes cache.populated events. Without
      # both env vars the consumer + policy CRUD silently stay off
      # (existing SignManifest / ListSignatures keep working).
      SIGNER_DB_DSN: postgres://registry:registry@postgres:5432/registry_signer?sslmode=prefer
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/signer.crt
      MTLS_KEY_PATH: /certs/signer.key
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup.
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8086:8080"
      - "50057:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-webhook:
    build:
      context: ../../
      dockerfile: services/webhook/Dockerfile
      args:
        SERVICE: webhook
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-webhook
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_webhook?sslmode=prefer
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      CREDENTIAL_KEY_HEX: ${WEBHOOK_CREDENTIAL_KEY_HEX}
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/webhook.crt
      MTLS_KEY_PATH: /certs/webhook.key
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup.
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8087:8080"
      - "50058:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-audit:
    build:
      context: ../../
      dockerfile: services/audit/Dockerfile
      args:
        SERVICE: audit
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-audit
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_audit?sslmode=prefer
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      TRUSTED_GATEWAY_IP: registry-gateway
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/audit.crt
      MTLS_KEY_PATH: /certs/audit.key
      # Audit-log streaming to SIEM (futures.md Tier 1 #4). 64-char
      # hex = 32 bytes of AES-256-GCM key material used to seal the
      # per-tenant hmac_secret + bearer_token at rest. Empty leaves
      # the streaming RPCs operational for syslog-only flows but
      # rejects writes that carry a plaintext webhook secret.
      # Generate with `openssl rand -hex 32`.
      AUDIT_EXPORT_SECRETS_KEY_HEX: ${AUDIT_EXPORT_SECRETS_KEY_HEX:-00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup.
      # The audit gRPC server pins every inbound RPC to the tenant returned by
      # registry-tenant's GetDeploymentMetadata at startup. Required when
      # DEPLOYMENT_MODE=single (the platform default).
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8088:8080"
      - "50059:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-gc:
    build:
      context: ../../
      dockerfile: services/gc/Dockerfile
      args:
        SERVICE: gc
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-gc
      METADATA_GRPC_ADDR: registry-metadata:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      # TENANT_GRPC_ADDR lets the collector enumerate tenants via the
      # tenant directory instead of trying to stream every repository
      # row from metadata (which fails with "invalid input syntax for
      # type uuid" because metadata's ListRepositories rejects empty
      # tenant_id). Optional — when unset the collector falls back to
      # the broken metadata path (kept for unit tests).
      TENANT_GRPC_ADDR: registry-tenant:50051
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      # DB_DSN enables FE-API-032 — without it the gc gRPC handlers
      # return FailedPrecondition "gc repository not configured" and
      # the admin dashboard's GC card stays in its empty-state fallback.
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_gc?sslmode=prefer
      GC_MODE: full
      GC_RUN_INTERVAL_HOURS: "24"
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/gc.crt
      MTLS_KEY_PATH: /certs/gc.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8089:8080"
      - "50060:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-metadata:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # REDESIGN-001 Phase 3.4 — gc reuses its existing tenant gRPC
      # connection for the bootstrap-tenant-id lookup in single mode,
      # which means registry-tenant must be Serving before gc dials.
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-tenant:
    build:
      context: ../../
      dockerfile: services/tenant/Dockerfile
      args:
        SERVICE: tenant
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-tenant
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_tenant?sslmode=prefer
      REDIS_ADDR: redis:6379
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/tenant.crt
      MTLS_KEY_PATH: /certs/tenant.key
    volumes:
      - certs_data:/certs:ro
    ports:
      - "8090:8080"
      - "50061:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 10s
    restart: unless-stopped

  registry-management:
    build:
      context: ../../
      dockerfile: services/management/Dockerfile
      args:
        SERVICE: management
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-management
      HTTP_ADDR: ":8085"
      AUTH_GRPC_ADDR: registry-auth:50051
      METADATA_GRPC_ADDR: registry-metadata:50051
      AUDIT_GRPC_ADDR: registry-audit:50051
      # TENANT_GRPC_ADDR enables the super-admin /api/v1/admin/tenants routes
      # (create/list/delete tenants). Empty disables them with 404. Callers
      # additionally need the platform-admin marker role (admin / org / *).
      TENANT_GRPC_ADDR: registry-tenant:50051
      # WEBHOOK_GRPC_ADDR enables the /api/v1/webhooks family (FE-API-021..024).
      # Empty disables those routes with 404 "route disabled".
      WEBHOOK_GRPC_ADDR: registry-webhook:50051
      # SIGNER_GRPC_ADDR enables FE-API-003 /api/v1/.../signature. Empty leaves
      # the route at 404 "route disabled" — frontend renders the unsigned state.
      SIGNER_GRPC_ADDR: registry-signer:50051
      # SCANNER_GRPC_ADDR enables REM-011 Phase 2 admin routes
      # (FE-API-044..047 — adapter list / swap / test scan / health).
      # Empty leaves the routes at 404 "route disabled". The scanner is
      # opt-in via `--profile scanner`, so this addr resolves but the
      # gRPC calls fail until the scanner profile is up; the BFF
      # gracefully maps gRPC unavailable → 503 in that case.
      SCANNER_GRPC_ADDR: registry-scanner:50051
      # GC_GRPC_ADDR enables FE-API-032 admin GC routes
      # (/admin/gc/status, /admin/gc/runs, /admin/gc/run). Empty leaves
      # them at 404 "route disabled" and the dashboard's GC card shows
      # a friendly "GC visibility isn't wired" fallback.
      GC_GRPC_ADDR: registry-gc:50051
      # PROXY_GRPC_ADDR enables FUT-013 /api/v1/proxy/cache routes
      # (list + stats + evict). Empty leaves them at 404 "route disabled"
      # and the sidebar entry stays hidden via the probe-and-hide hook.
      PROXY_GRPC_ADDR: registry-proxy:50051
      # CORE_GRPC_ADDR enables the tag-detail Referrers tab
      # (GET /api/v1/repositories/{org}/{repo}/tags/{tag}/referrers → core's
      # CoreService.ListReferrers). registry-core's gRPC listens on :50051
      # inside the network (compose publishes it to host :50052). Empty leaves
      # the route at 404 "route disabled" and the Referrers panel shows a
      # friendly "not enabled" fallback.
      CORE_GRPC_ADDR: registry-core:50051
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      # CORS_ALLOWED_ORIGIN: set to the frontend origin in production.
      # Defaults to http://localhost:5173 inside the service for local dev.
      CORS_ALLOWED_ORIGIN: http://localhost:5173
      # PLATFORM_ADMIN_TENANT_ID: tenant whose admin/owner users can call the
      # cross-tenant quota route (PUT /api/v1/admin/tenants/<id>/quota). The dev
      # tenant is the operator tenant locally; production should use a dedicated
      # operator tenant created out of band.
      PLATFORM_ADMIN_TENANT_ID: ${PLATFORM_ADMIN_TENANT_ID:-98dbe36b-ef28-4903-b25c-bff1b2921c9e}
      PLATFORM_HOST: localhost:8080
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/management.crt
      MTLS_KEY_PATH: /certs/management.key
      LOG_FORMAT: text
      LOG_LEVEL: info
    volumes:
      - certs_data:/certs:ro
      # REM-012 (2026-06-22) — the scanner_reports shared mount that used
      # to live here is gone. Management now streams compliance reports
      # via the scanner's DownloadComplianceReport gRPC stream rather
      # than opening files on a shared volume; the mount stays on
      # registry-scanner (the writer) but the reader side no longer
      # needs filesystem access. See status.md → REM-012 for the rationale.
    ports:
      # External 8091 avoids collision with registry-scanner (8085) in the scanner profile.
      - "8091:8085"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-auth:
        condition: service_healthy
      registry-metadata:
        condition: service_healthy
      registry-audit:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8085/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── registry-mcp (FUT-031, opt-in via --profile mcp) ────────────────────────
  #
  # Model Context Protocol server. Wraps the management BFF in the MCP
  # JSON-RPC protocol so AI coding assistants (Cursor remote,
  # continue.dev) can query the registry in natural language.
  #
  # Read-only tool surface in v1 — no mutations. See docs/MCP.md for the
  # tool list + Claude Desktop stdio setup (which uses `docker run -i`
  # directly, NOT this compose service).
  #
  # Bring up:
  #   docker compose --profile mcp up -d registry-mcp
  #
  # An operator provisions MCP_API_KEY as a service-account key with
  # read scopes via /api-keys in the dashboard, then puts it in
  # infra/docker-compose/.env alongside MCP_TENANT_ID (the workspace
  # tenant id — usually the bootstrap tenant in single-mode).
  registry-mcp:
    build:
      context: ../../
      dockerfile: services/mcp/Dockerfile
      args:
        SERVICE: mcp
    profiles: ["mcp"]
    environment:
      # No OTEL — this service is a small HTTP client wrapper; keep it
      # zero-instrumentation until observability tells us we need it.
      MCP_TRANSPORT: http
      MCP_HTTP_ADDR: ":8092"
      MCP_MANAGEMENT_URL: http://registry-management:8085
      # Operator provides these two via .env. Empty MCP_API_KEY makes
      # the container fail at startup with a clean error — see
      # services/mcp/internal/config for the validation.
      MCP_API_KEY: ${MCP_API_KEY:-}
      MCP_TENANT_ID: ${MCP_TENANT_ID:-${PLATFORM_ADMIN_TENANT_ID:-98dbe36b-ef28-4903-b25c-bff1b2921c9e}}
      LOG_FORMAT: json
      LOG_LEVEL: info
    ports:
      - "8092:8092"
    depends_on:
      registry-management:
        condition: service_healthy
    networks:
      - registry
    restart: unless-stopped

  # Scanner is opt-in via the `scanner` profile. Zero config required:
  # ── Clair v4 (REM-014, opt-in via --profile clair) ────────────────────────
  #
  # Adds a third vulnerability scanner option alongside Trivy + Grype.
  # The clair-adapter binary baked into the scanner image talks to the
  # `clair` service below over HTTP on port 6060. Layers are served back
  # to Clair from the scanner container on a side port (CLAIR_FETCH_PORT
  # below) — the adapter spins up an embedded HTTP server during a scan
  # so Clair can pull each layer by URI without needing registry-core
  # credentials. Production deployments would replace this with Clair
  # → registry-core direct fetch + a service-account JWT; that's tracked
  # as a follow-up because the embedded-server path keeps the dev compose
  # stack stand-alone (no extra service-account provisioning step).
  #
  # Bring up:
  #   docker compose --profile clair up -d clair-db clair
  #
  # Then either:
  #   (a) flip the scanner's active adapter via /admin/scanner UI to
  #       "clair-adapter", OR
  #   (b) set SCANNER_PLUGIN_PATH=/usr/local/bin/scanner-clair-adapter
  #       on the registry-scanner service env block.
  #
  # First boot downloads the Clair vulnerability feeds (~1 GB on disk
  # under the named clair_data volume); subsequent boots reuse the
  # cache and warm up in seconds.
  clair-db:
    # Pinned at Postgres 16 to match the platform's main DB version —
    # easier for an ops walk-through if the same psql client + tooling
    # works against both clusters.
    image: postgres:16-alpine
    profiles: ["clair"]
    environment:
      POSTGRES_USER: clair
      POSTGRES_PASSWORD: clair
      POSTGRES_DB: clair
    volumes:
      - clair_db:/var/lib/postgresql/data
    networks:
      - registry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clair -d clair"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  clair:
    # Combo mode runs indexer + matcher + notifier in one process. The
    # upstream image is quay.io/projectquay/clair; pinning to 4.7.4
    # (Aug 2024) which is the last patch on the v4.7 line. The config
    # file lives in infra/clair/ and is mounted read-only.
    image: quay.io/projectquay/clair:4.7.4
    profiles: ["clair"]
    command: ["-mode", "combo", "-conf", "/etc/clair/config.yaml"]
    environment:
      # Clair reads CLAIR_CONF in addition to the -conf flag in some
      # code paths; setting both keeps any future internal refactor on
      # the upstream side from silently switching back to the default
      # bundled config.
      CLAIR_CONF: /etc/clair/config.yaml
      CLAIR_MODE: combo
    volumes:
      - ../clair/config.yaml:/etc/clair/config.yaml:ro
    ports:
      # Expose the indexer/matcher HTTP API on the host for ad-hoc
      # `curl /indexer/api/v1/index_state` debugging. The adapter
      # reaches the same port via the registry network without needing
      # this host mapping.
      - "6060:6060"
      # Introspection / metrics — Prometheus scrape target hook for a
      # follow-up integration. 8099 not 8089 — the latter is registry-gc.
      - "8099:8099"
    depends_on:
      clair-db:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      # Clair's own readiness probe — /indexer/api/v1/index_state is
      # cheap (one DB SELECT) and returns 200 only when the schema
      # migrations are applied.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6060/indexer/api/v1/index_state >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  #   docker compose --profile scanner up -d registry-scanner
  #
  # The image ships three adapters that satisfy the JSON-RPC plugin contract:
  #   /usr/local/bin/scanner-dev-stub      (default — hardcoded findings, for UI demos)
  #   /usr/local/bin/scanner-trivy-adapter (real CVE detection via Trivy)
  #   /usr/local/bin/scanner-grype-adapter (real CVE detection via Grype)
  #   /usr/local/bin/scanner-clair-adapter (real CVE detection via Clair — needs `--profile clair`)
  #
  # The entrypoint auto-computes SCANNER_PLUGIN_CHECKSUM from the active
  # binary so neither env var needs a value in dev. Operators wanting real
  # scans should set SCANNER_PLUGIN_PATH to the trivy adapter; the env
  # default below empty-falls-through to the Dockerfile default.
  registry-scanner:
    build:
      context: ../../
      dockerfile: services/scanner/Dockerfile
      args:
        SERVICE: scanner
    profiles: ["scanner"]
    environment:
      <<: *otel
      OTEL_SERVICE_NAME: registry-scanner
      METADATA_GRPC_ADDR: registry-metadata:50051
      STORAGE_GRPC_ADDR: registry-storage:50051
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-registry}:${RABBITMQ_DEFAULT_PASS:-registry}@rabbitmq:5672/
      # Scanner owns its own Postgres schema (FE-API-018 scan policies +
      # FE-API-019 compliance reports). Uses the platform-wide pg container.
      DB_DSN: postgres://registry:${POSTGRES_PASSWORD:-registry}@postgres:5432/registry_scanner?sslmode=prefer
      # Operator override → image default → adapter selection. Empty
      # values fall through to the Dockerfile's ENV defaults; entrypoint
      # auto-computes SCANNER_PLUGIN_CHECKSUM from the active binary.
      SCANNER_PLUGIN_PATH: ${SCANNER_PLUGIN_PATH:-}
      SCANNER_PLUGIN_CHECKSUM: ${SCANNER_PLUGIN_CHECKSUM:-}
      # REM-014 — Clair adapter config. Empty when the operator runs
      # the dev stack without `--profile clair`; the adapter binary
      # logs + exits cleanly in that case, so picking "clair" from
      # the /admin/scanner UI surfaces a clear "Clair service is not
      # reachable" error rather than a generic scan timeout.
      CLAIR_URL: http://clair:6060
      # CLAIR_FETCH_PORT controls the embedded HTTP server the adapter
      # spins up to serve staged layers back to Clair. Defaults to 9099;
      # change here if a host-port collision on `9099` is observed.
      CLAIR_FETCH_PORT: "9099"
      # Hostname the Clair container will use to reach the adapter's
      # embedded HTTP server. Must resolve on the `registry` Docker
      # network — the compose service name is the canonical answer.
      CLAIR_FETCH_HOST: registry-scanner
      MTLS_CA_CERT_PATH: /certs/ca.crt
      MTLS_CERT_PATH: /certs/scanner.crt
      MTLS_KEY_PATH: /certs/scanner.key
      # REDESIGN-001 Phase 3.4 — single-mode bootstrap-tenant-id lookup.
      TENANT_GRPC_ADDR: registry-tenant:50051
    volumes:
      - certs_data:/certs:ro
      # FE-API-019 compliance reports — scanner writes rendered PDF +
      # SPDX JSON artifacts here. REM-012 (2026-06-22) moved the
      # cross-service handoff to a streaming gRPC RPC, so this is a
      # scanner-private volume now rather than a shared mount.
      - scanner_reports:/tmp/reports
    ports:
      - "8085:8080"
      - "50056:50051"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      registry-metadata:
        condition: service_healthy
      registry-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      registry-tenant:
        condition: service_healthy
      # RED-FU-007 - wait for the one-shot bootstrap container that
      # seeds deployment_metadata.bootstrap_tenant_id; without this the
      # Phase 3.4 fetchBootstrapTenantID lookup fails closed at startup.
      registry-bootstrap:
        condition: service_completed_successfully
    networks:
      - registry
    healthcheck:
      <<: *healthcheck
      start_period: 15s
    restart: unless-stopped

  # ── Frontend (Beacon SPA) ─────────────────────────────────────────────────
  # Two-stage build (frontend/Dockerfile): Node builds the Vite bundle, nginx
  # serves it on :8080 and reverse-proxies /api + /auth to the backend services.
  # In this compose the gateway is a health-only stub, so the container's
  # nginx.conf splits the /api namespace itself (auth-owned subroutes →
  # registry-auth, BFF routes → registry-management) exactly like the vite dev
  # proxy — running the SPA here replaces `npm run dev`. Browse at
  # http://localhost:3000.
  registry-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes this into the bundle at build time; the login page
        # hard-errors without it. Defaults to the fixed dev bootstrap tenant id
        # seeded by registry-auth-bootstrap above, overridable via the env.
        VITE_DEFAULT_TENANT_ID: ${VITE_DEFAULT_TENANT_ID:-98dbe36b-ef28-4903-b25c-bff1b2921c9e}
    ports:
      - "3000:8080"
    depends_on:
      registry-auth:
        condition: service_healthy
      registry-management:
        condition: service_healthy
    networks:
      - registry
    healthcheck:
      # nginx image has no /healthcheck binary; probe the nginx-served /healthz.
      # Use 127.0.0.1, not localhost: nginx binds IPv4 (`listen 8080;`) but the
      # container's `localhost` resolves to IPv6 `::1` first, so wget localhost
      # gets connection-refused and the container falsely reports unhealthy.
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  registry:
    name: registry
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  certs_data:
  # Scanner-private — REM-012 (2026-06-22) moved cross-service compliance
  # report transfer to a streaming gRPC RPC; this volume now only lives
  # on registry-scanner so the report worker has a stable rendering
  # destination.
  scanner_reports:
  # REM-014 — Clair's Postgres data directory. Opt-in via `--profile
  # clair` so the volume only materialises when the operator wants
  # Clair available. Holds the indexer's manifest_index table + the
  # matcher's vulnerability feed cache (~1 GB after first updater
  # run).
  clair_db:
