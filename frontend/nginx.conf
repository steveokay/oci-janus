# Beacon — production nginx config.
#
# Covers:
#   - SPA history-API fallback (every unknown path → index.html)
#   - Secure response headers (FE-SEC-003 CSP, FE-SEC-014 X-Frame, etc.)
#   - HSTS (FE-SEC-013) when served over HTTPS via the gateway
#   - Reverse proxy for /api/* + /auth/* to the backend services, splitting
#     the namespace exactly like the vite dev proxy does (see below).
#
# API routing note:
#   In a gateway-fronted production topology the gateway routes every
#   /api/v1/* to the right service, so this file could send all /api/ to one
#   upstream. But in docker-compose the gateway is a health-only stub, so
#   nginx must split the namespace itself — mirroring frontend/vite.config.ts:
#   auth-owned subroutes (login/logout/token/apikeys/users/service-accounts/
#   access) go to registry-auth; the BFF exceptions that live under those
#   prefixes (users/me/notification-preferences, access/oidc-trust,
#   access/token-policy, access/review) and everything else go to
#   registry-management. nginx longest-prefix matching resolves the
#   exceptions automatically (the more-specific location wins).
#
# This config is deliberately verbose for review-friendliness.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip the obvious things; the gateway in front will handle brotli.
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # ---- security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ---- shared proxy settings ----
    # Defined once at the server level so every proxied location inherits
    # them (nginx inherits proxy_set_header/timeouts into a location only
    # when that location declares none of its own — none below do). The
    # per-location blocks therefore need just a proxy_pass line.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
    # Conservative timeouts; the longest legitimate request is a blob list —
    # minutes are not normal.
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Healthcheck endpoint for Kubernetes / docker-compose. Served by nginx
    # itself (not proxied) so the container is healthy before the backends are.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- auth-owned API routes → registry-auth ----
    location /api/v1/login           { proxy_pass http://registry-auth:8080; }
    location /api/v1/logout          { proxy_pass http://registry-auth:8080; }
    location /api/v1/token           { proxy_pass http://registry-auth:8080; }
    location /api/v1/apikeys         { proxy_pass http://registry-auth:8080; }
    location /api/v1/users           { proxy_pass http://registry-auth:8080; }
    location /api/v1/service-accounts { proxy_pass http://registry-auth:8080; }
    location /api/v1/access          { proxy_pass http://registry-auth:8080; }

    # ---- BFF exceptions that live under an auth prefix → registry-management ----
    # These are longer prefixes than the auth locations above, so nginx's
    # longest-prefix match routes them here (matching the vite dev proxy,
    # where the order-sensitive entries precede the /api/v1/users and
    # /api/v1/access catch-alls).
    location /api/v1/users/me/notification-preferences { proxy_pass http://registry-management:8085; }
    location /api/v1/access/oidc-trust    { proxy_pass http://registry-management:8085; }
    location /api/v1/access/token-policy  { proxy_pass http://registry-management:8085; }
    location /api/v1/access/review        { proxy_pass http://registry-management:8085; }

    # ---- everything else under /api/ → registry-management (BFF) ----
    location /api/ {
        proxy_pass http://registry-management:8085;
    }

    # ---- auth token / JWKS surfaces → registry-auth ----
    location /auth/        { proxy_pass http://registry-auth:8080; }
    location /.well-known/ { proxy_pass http://registry-auth:8080; }

    # ---- hashed bundle assets ----
    # Vite emits content-hashed filenames; cache them aggressively.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- SPA fallback ----
    # Anything else falls through to index.html — TanStack Router handles
    # the path on the client. index.html must NOT be cached, so the client
    # always sees the latest bundle reference.
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri /index.html;
    }
}
