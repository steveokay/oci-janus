# Beacon — production nginx config.
#
# Covers:
#   - SPA history-API fallback (every unknown path → index.html)
#   - Secure response headers (FE-SEC-003 CSP, FE-SEC-014 X-Frame, etc.)
#   - HSTS (FE-SEC-013) when served over HTTPS via the gateway
#   - Reverse proxy for /api/v1/* → registry-management
#   - Reverse proxy for /auth/*    → registry-auth
#
# This config is deliberately verbose for review-friendliness.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip the obvious things; the gateway in front will handle brotli.
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # ---- security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Healthcheck endpoint for Kubernetes / docker-compose.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- API proxying ----
    # Management API (BFF). Connect/read timeouts set conservatively;
    # the longest legitimate request is a blob list — minutes are not normal.
    location /api/ {
        proxy_pass http://registry-management:8085;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Auth surfaces — Docker token, JWKS, login when wired through here.
    location /auth/ {
        proxy_pass http://registry-auth:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ---- hashed bundle assets ----
    # Vite emits content-hashed filenames; cache them aggressively.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- SPA fallback ----
    # Anything else falls through to index.html — TanStack Router handles
    # the path on the client. index.html must NOT be cached, so the client
    # always sees the latest bundle reference.
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri /index.html;
    }
}
