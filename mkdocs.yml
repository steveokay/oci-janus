# MkDocs configuration for the OCI-Janus documentation site (FUT-076).
#
# The site is built from the existing `docs/*.md` reference material plus a
# small set of site-only pages (index, getting-started). Nothing here
# duplicates the reference docs — the nav simply curates what already exists.
#
# Local preview:  pip install -r requirements-docs.txt && mkdocs serve
# CI publish:     .github/workflows/docs-site.yml builds + deploys to GitHub Pages.
site_name: OCI-Janus
site_description: >-
  Self-hosted, OCI Distribution Spec v1.1 registry — mTLS everywhere,
  multi-key JWT signing, tamper-evident audit, pluggable storage/scanners/signing.
site_url: https://steveokay.github.io/oci-janus/
site_author: OCI-Janus maintainers
copyright: Apache-2.0 licensed. Built with MkDocs Material.

repo_url: https://github.com/steveokay/oci-janus
repo_name: steveokay/oci-janus
# "Edit this page" points at the file on the default branch.
edit_uri: edit/main/docs/

# Content lives in the existing docs/ tree; the built site goes to site/
# (gitignored). CI overrides the output dir with --site-dir _site.
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs          # top-level sections become horizontal tabs
    - navigation.sections       # group children as sidebar sections
    - navigation.top            # back-to-top button
    - navigation.instant        # SPA-style instant loading
    - navigation.tracking       # update URL anchor while scrolling
    - navigation.indexes        # section landing pages
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy         # copy button on code blocks
    - content.action.edit       # "edit this page" link
  palette:
    # Light mode (default) with a toggle to dark.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# `search` is bundled with Material and needs no extra dependency.
plugins:
  - search
  - swagger-ui-tag
  # Click-to-zoom on screenshots. GIFs opt out (class "off-glb") so they keep
  # animating inline rather than opening a frozen frame in the lightbox.
  - glightbox:
      auto_caption: false
      skip_classes:
        - off-glb

# Planning specs and raw Postman exports are not user-facing — keep them out
# of the published site entirely.
exclude_docs: |
  superpowers/
  postman/

# Individual ADR files are reachable via the ADR index (adr/README.md) but
# should not each appear in the sidebar; silence the "not in nav" warnings.
not_in_nav: |
  /adr/0*.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started:
      - Quick start: getting-started.md
      - Self-hosting: SELF-HOSTING.md
      - Deploying (Compose + Helm): deployment-guide.md
      - Deployment reference: DEPLOYMENT.md
      - Environment reference: env-reference.md
      - Migrating v1 → v2: MIGRATION-v1-to-v2.md
  - Using the dashboard:
      - Overview & sign-in: guide/index.md
      - Repositories & tags: guide/repositories.md
      - Security: guide/security.md
      - Access & identity: guide/access.md
      - Settings: guide/settings.md
      - Operations: guide/operations.md
  - Integrations:
      - Catalog overview: integrations/index.md
      - Storage backends: integrations/storage.md
      - Vulnerability scanning: SCANNER.md
      - Image signing: SIGNING.md
      - Admission control: ADMISSION.md
      - Image promotion: IMAGE-PROMOTION.md
      - Credential helpers: CREDENTIAL-HELPERS.md
      - Connect an AI agent (MCP): MCP.md
  - Security & identity:
      - Authentication: AUTH.md
      - SAML SSO: SAML.md
      - Token policies: TOKEN-POLICIES.md
      - Workload identity: WORKLOAD-IDENTITY.md
      - Access reviews: ACCESS-REVIEW.md
      - SIEM export: SIEM-EXPORT.md
      - Hardening checklist: HARDENING-CHECKLIST.md
  - Architecture & internals:
      - Architecture overview: architecture.md
      - Services: SERVICES.md
      - API & automation: api-reference.md
      - API explorer (OpenAPI): api-spec.md
      - gRPC conventions: GRPC-CONVENTIONS.md
      - Database: DATABASE.md
      - Events: EVENTS.md
      - Observability: OBSERVABILITY.md
      - Testing: TESTING.md
      - CI/CD: CI-CD.md
  - Decisions (ADRs): adr/README.md
