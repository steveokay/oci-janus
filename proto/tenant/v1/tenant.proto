syntax = "proto3";

package registry.tenant.v1;

option go_package = "github.com/steveokay/oci-janus/proto/gen/go/tenant/v1;tenantv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service TenantService {
  rpc CreateTenant(CreateTenantRequest) returns (Tenant);
  rpc GetTenant(GetTenantRequest) returns (Tenant);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  rpc DeleteTenant(DeleteTenantRequest) returns (google.protobuf.Empty);
  rpc GetTenantPolicy(GetTenantPolicyRequest) returns (TenantPolicy);
  rpc UpdateTenantPolicy(UpdateTenantPolicyRequest) returns (TenantPolicy);
  // UpdateTenant (FE-API-029) mutates the tenant's name and/or plan. Either or
  // both of `name` / `plan` may be supplied; absence means "do not change this
  // field". When the name changes the slug is recomputed atomically inside the
  // same transaction so the wildcard host (`<slug>.<base>`) follows the rename
  // on the very next GetTenant.
  rpc UpdateTenant(UpdateTenantRequest) returns (Tenant);
}

message Tenant {
  string tenant_id = 1;
  string name      = 2;
  string plan      = 3;
  google.protobuf.Timestamp created_at = 4;
  // FE-API-007: workspace identity completion.
  // slug is the DNS-safe handle used to construct the wildcard registry
  // hostname (`<slug>.<PLATFORM_BASE_DOMAIN>`). Derived from `name` at
  // tenant creation/backfill — see services/tenant repository.
  string slug = 5;
  // host is the wildcard registry hostname for this tenant:
  // `<slug>.<PLATFORM_BASE_DOMAIN>`. Per-tenant custom domains were
  // removed in REDESIGN-001 RM-001.
  string host = 6;
  // Fields 7 and 8 were host_is_custom and domains (repeated DomainEntry).
  // Removed in REDESIGN-001 RM-001. Field numbers reserved to avoid
  // mismatched decodes with older clients that may still carry those fields.
  reserved 7, 8;
  reserved "host_is_custom", "domains";
}

message TenantPolicy {
  string tenant_id            = 1;
  bool   scan_on_push         = 2;
  string block_on_severity    = 3; // "CRITICAL"|"HIGH"|"MEDIUM"|""
  bool   allow_unscanned      = 4;
  bool   proxy_cache_enabled  = 5;
  bool   signing_required     = 6;
  repeated string exempt_repositories = 7;
  int64  storage_quota_bytes  = 8;
}

message CreateTenantRequest {
  string name = 1;
  string plan = 2;
}
message GetTenantRequest    { string tenant_id = 1; }
message DeleteTenantRequest { string tenant_id = 1; }

// ListTenants pagination — page_size clamped to [1, 200] (default 50);
// page_token is opaque to clients (created_at|id cursor in the implementation).
message ListTenantsRequest {
  int32  page_size  = 1;
  string page_token = 2;
}
message ListTenantsResponse {
  repeated Tenant tenants = 1;
  string next_page_token  = 2;
}

// UpdateTenantRequest carries the optional fields to mutate. Both `name` and
// `plan` are `optional` so absence is distinguishable from the empty string —
// callers may explicitly pass an empty value, but in practice the management
// layer rejects empty names before reaching the gRPC server.
message UpdateTenantRequest {
  string tenant_id        = 1;
  optional string name    = 2;
  optional string plan    = 3;
}

message GetTenantPolicyRequest    { string tenant_id = 1; }
message UpdateTenantPolicyRequest {
  string tenant_id            = 1;
  bool   scan_on_push         = 2;
  string block_on_severity    = 3;
  bool   allow_unscanned      = 4;
  bool   proxy_cache_enabled  = 5;
  bool   signing_required     = 6;
  repeated string exempt_repositories = 7;
  int64  storage_quota_bytes  = 8;
}
