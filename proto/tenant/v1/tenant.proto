syntax = "proto3";

package registry.tenant.v1;

option go_package = "github.com/steveokay/oci-janus/proto/gen/go/tenant/v1;tenantv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service TenantService {
  rpc CreateTenant(CreateTenantRequest) returns (Tenant);
  rpc GetTenant(GetTenantRequest) returns (Tenant);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  rpc DeleteTenant(DeleteTenantRequest) returns (google.protobuf.Empty);
  rpc ResolveDomain(ResolveDomainRequest) returns (ResolveDomainResponse);
  rpc RegisterDomain(RegisterDomainRequest) returns (RegisterDomainResponse);
  rpc GetTenantPolicy(GetTenantPolicyRequest) returns (TenantPolicy);
  rpc UpdateTenantPolicy(UpdateTenantPolicyRequest) returns (TenantPolicy);
  // UpdateTenant (FE-API-029) mutates the tenant's name and/or plan. Either or
  // both of `name` / `plan` may be supplied; absence means "do not change this
  // field". When the name changes the slug is recomputed atomically inside the
  // same transaction so the wildcard host (`<slug>.<base>`) follows the rename
  // on the very next GetTenant.
  rpc UpdateTenant(UpdateTenantRequest) returns (Tenant);

  // FE-API-027 custom-domain CRUD. ListTenantDomains returns every domain row
  // for a tenant with verification + scheduling metadata so the dashboard can
  // render the domain settings page in a single round trip.
  rpc ListTenantDomains(ListTenantDomainsRequest) returns (ListTenantDomainsResponse);
  // VerifyDomainNow re-runs the DNS TXT check inline (the worker normally
  // schedules it on a 5–20 minute cadence). On success the domain is marked
  // verified + promoted to primary when no other primary exists.
  rpc VerifyDomainNow(VerifyDomainNowRequest) returns (DomainEntry);
  // SetPrimaryDomain demotes the current primary (if any) and promotes the
  // target domain in the same transaction. The target must already be
  // verified — unverified targets return FailedPrecondition.
  rpc SetPrimaryDomain(SetPrimaryDomainRequest) returns (DomainEntry);
  // DeleteDomain removes a tenant domain. The response payload is empty; the
  // management layer surfaces "was this the primary" out-of-band via a header.
  rpc DeleteDomain(DeleteDomainRequest) returns (google.protobuf.Empty);
}

message Tenant {
  string tenant_id = 1;
  string name      = 2;
  string plan      = 3;
  google.protobuf.Timestamp created_at = 4;
  // FE-API-007: workspace identity completion.
  // slug is the DNS-safe handle used to construct the wildcard registry
  // hostname (`<slug>.<PLATFORM_BASE_DOMAIN>`). Derived from `name` at
  // tenant creation/backfill — see services/tenant repository.
  string slug = 5;
  // host is the resolved registry hostname for this tenant — either the
  // primary verified custom domain (when host_is_custom=true) or the
  // wildcard fallback `<slug>.<PLATFORM_BASE_DOMAIN>`.
  string host = 6;
  // host_is_custom reports whether `host` came from a verified custom
  // domain. False means the wildcard fallback was used.
  bool host_is_custom = 7;
  // domains lists every domain registered against this tenant alongside its
  // verification state and primary-domain marker.
  repeated DomainEntry domains = 8;
}

// DomainEntry is a single tenant_domains row surfaced to API consumers.
// `is_primary` reflects the host-selection winner; only one verified
// domain per tenant may carry is_primary=true (enforced by the partial
// unique index added in 20260620000002_add_domain_is_primary.sql).
message DomainEntry {
  string domain      = 1;
  bool   verified    = 2;
  bool   is_primary  = 3;
  // FE-API-027 fields. Appended (4..9) so existing readers (FE-API-007) keep
  // working unchanged. verification_token MUST never be returned to API
  // callers — the management BFF strips it before serialising the JSON.
  string verification_token             = 4;
  google.protobuf.Timestamp registered_at    = 5;
  google.protobuf.Timestamp verified_at      = 6;
  google.protobuf.Timestamp next_poll_after  = 7;
  bool   notified_24h = 8;
  bool   notified_48h = 9;
}

message TenantPolicy {
  string tenant_id            = 1;
  bool   scan_on_push         = 2;
  string block_on_severity    = 3; // "CRITICAL"|"HIGH"|"MEDIUM"|""
  bool   allow_unscanned      = 4;
  bool   proxy_cache_enabled  = 5;
  bool   signing_required     = 6;
  repeated string exempt_repositories = 7;
  int64  storage_quota_bytes  = 8;
}

message CreateTenantRequest {
  string name = 1;
  string plan = 2;
}
message GetTenantRequest    { string tenant_id = 1; }
message DeleteTenantRequest { string tenant_id = 1; }

// ListTenants pagination — page_size clamped to [1, 200] (default 50);
// page_token is opaque to clients (created_at|id cursor in the implementation).
message ListTenantsRequest {
  int32  page_size  = 1;
  string page_token = 2;
}
message ListTenantsResponse {
  repeated Tenant tenants = 1;
  string next_page_token  = 2;
}

message ResolveDomainRequest  { string domain = 1; }
message ResolveDomainResponse { string tenant_id = 1; bool found = 2; }

message RegisterDomainRequest {
  string tenant_id = 1;
  string domain    = 2;
}
message RegisterDomainResponse {
  string verification_token = 1; // add as TXT record at _registry-verify.<domain>
}

// UpdateTenantRequest carries the optional fields to mutate. Both `name` and
// `plan` are `optional` so absence is distinguishable from the empty string —
// callers may explicitly pass an empty value, but in practice the management
// layer rejects empty names before reaching the gRPC server.
message UpdateTenantRequest {
  string tenant_id        = 1;
  optional string name    = 2;
  optional string plan    = 3;
}

// FE-API-027 request envelopes. Every domain mutation requires both the
// tenant_id (drawn from the JWT in the management BFF — never a body field)
// and the domain string, so each request carries both as identity.
message ListTenantDomainsRequest  { string tenant_id = 1; }
message ListTenantDomainsResponse { repeated DomainEntry domains = 1; }
message VerifyDomainNowRequest    { string tenant_id = 1; string domain = 2; }
message SetPrimaryDomainRequest   { string tenant_id = 1; string domain = 2; }
message DeleteDomainRequest       { string tenant_id = 1; string domain = 2; }

message GetTenantPolicyRequest    { string tenant_id = 1; }
message UpdateTenantPolicyRequest {
  string tenant_id            = 1;
  bool   scan_on_push         = 2;
  string block_on_severity    = 3;
  bool   allow_unscanned      = 4;
  bool   proxy_cache_enabled  = 5;
  bool   signing_required     = 6;
  repeated string exempt_repositories = 7;
  int64  storage_quota_bytes  = 8;
}
