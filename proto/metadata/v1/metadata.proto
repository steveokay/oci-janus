syntax = "proto3";

package registry.metadata.v1;

option go_package = "github.com/steveokay/oci-janus/proto/gen/go/metadata/v1;metadatav1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service MetadataService {
  // Repositories
  rpc CreateRepository(CreateRepositoryRequest) returns (Repository);
  rpc GetRepository(GetRepositoryRequest) returns (Repository);
  rpc GetRepositoryByName(GetRepositoryByNameRequest) returns (Repository);
  rpc ListRepositories(ListRepositoriesRequest) returns (stream Repository);
  rpc DeleteRepository(DeleteRepositoryRequest) returns (google.protobuf.Empty);
  rpc UpdateRepositoryQuota(UpdateRepositoryQuotaRequest) returns (Repository);
  rpc UpdateRepository(UpdateRepositoryRequest) returns (Repository);
  // Tag immutability (futures.md Tier 1 #2) — flips the repo-wide
  // `immutable_tags` flag. Separate RPC from UpdateRepository so the
  // audit trail records the security-relevant change explicitly
  // (description edits stay on the existing path).
  rpc UpdateRepositoryImmutability(UpdateRepositoryImmutabilityRequest) returns (Repository);

  // Tags
  rpc PutTag(PutTagRequest) returns (Tag);
  rpc GetTag(GetTagRequest) returns (Tag);
  rpc ListTags(ListTagsRequest) returns (stream Tag);
  rpc DeleteTag(DeleteTagRequest) returns (google.protobuf.Empty);
  // Tag immutability pin (futures.md Tier 1 #2) — flips the per-tag
  // `immutable` flag. Returns the updated Tag so the caller (FE,
  // promotion workflow) can confirm without a follow-up GetTag.
  rpc UpdateTagImmutable(UpdateTagImmutableRequest) returns (Tag);

  // Manifests
  rpc PutManifest(PutManifestRequest) returns (Manifest);
  rpc GetManifest(GetManifestRequest) returns (Manifest);
  rpc DeleteManifest(DeleteManifestRequest) returns (google.protobuf.Empty);
  // FE-API-050 — set / clear quarantine on a manifest. Called by the
  // scanner after a scan that violates the effective block_on_severity
  // policy (quarantined=true), and by services/management when an
  // operator manually quarantines or lifts via the dashboard.
  // Idempotent: re-applying quarantine=true keeps the existing
  // quarantined_at + quarantined_by (the FIRST event is the
  // load-bearing one for audit). quarantined=false clears all four
  // columns.
  rpc UpdateManifestQuarantine(UpdateManifestQuarantineRequest) returns (Manifest);
  rpc ListUntaggedManifests(ListUntaggedManifestsRequest) returns (stream Manifest);

  // Blobs
  rpc LinkBlob(LinkBlobRequest) returns (google.protobuf.Empty);
  rpc UnlinkBlob(UnlinkBlobRequest) returns (google.protobuf.Empty);
  rpc ListOrphanedBlobs(ListOrphanedBlobsRequest) returns (stream BlobRef);

  // Quota
  rpc GetTenantQuotaUsage(GetTenantQuotaUsageRequest) returns (QuotaUsage);
  rpc UpdateTenantQuota(UpdateTenantQuotaRequest) returns (QuotaUsage);
  rpc IncrementTenantStorage(IncrementTenantStorageRequest) returns (google.protobuf.Empty);
  rpc DecrementTenantStorage(DecrementTenantStorageRequest) returns (google.protobuf.Empty);

  // Scan status
  rpc UpdateScanStatus(UpdateScanStatusRequest) returns (google.protobuf.Empty);
  rpc GetScanResult(GetScanResultRequest) returns (ScanResult);

  // Per-tag SBOM storage (FE-API-033). The SBOM is persisted on the
  // scan_results row keyed by (tenant_id, manifest_digest); the management
  // BFF exposes a tag-scoped download route on top.
  //
  // UpsertScanSBOM is the scanner-side write seam — even when the scanner
  // hasn't been wired to call it yet, tests can pre-seed an SBOM through it.
  // GetScanSBOM returns NotFound when the manifest has no scan row or the
  // sbom_json column is NULL.
  rpc UpsertScanSBOM(UpsertScanSBOMRequest) returns (google.protobuf.Empty);
  rpc GetScanSBOM(GetScanSBOMRequest) returns (GetScanSBOMResponse);

  // Vulnerability aggregate
  rpc GetTenantVulnerabilityCount(GetTenantVulnerabilityCountRequest) returns (VulnerabilityCountResponse);

  // Repository count — efficient alternative to draining ListRepositories for stats.
  rpc CountRepositories(CountRepositoriesRequest) returns (CountRepositoriesResponse);

  // Security overview (FE-API-020) — single tenant-scoped aggregate combining
  // open-vulnerability counts, scan coverage, and recency. Backs
  // GET /api/v1/security/overview on registry-management.
  rpc GetSecurityOverview(GetSecurityOverviewRequest) returns (SecurityOverview);

  // ListTenantVulnerabilities (FE-API-014) — workspace-wide vulnerabilities,
  // grouped by CVE across the latest complete scan per (tenant, repo, tag).
  // Backs GET /api/v1/security/vulnerabilities on registry-management.
  rpc ListTenantVulnerabilities(ListTenantVulnerabilitiesRequest) returns (ListTenantVulnerabilitiesResponse);

  // ListScanHistory (FE-API-015) — flat scan-history feed ordered by
  // completed_at DESC. Backs GET /api/v1/security/scans on
  // registry-management.
  rpc ListScanHistory(ListScanHistoryRequest) returns (ListScanHistoryResponse);

  // ListTenantRemediations (FE-API-017) — actionable upgrade groupings:
  // "upgrade package X from version A to version B fixes N CVEs across M
  // (repo, tag) tuples." Computed from the latest complete scan per
  // (tenant, repo, manifest_digest). Backs GET /api/v1/security/remediation
  // on registry-management.
  rpc ListTenantRemediations(ListTenantRemediationsRequest) returns (ListTenantRemediationsResponse);

  // GetTenantStorageBreakdown (FE-API-031) — top-50 repos by storage,
  // plus the tenant-wide total. Backs GET /api/v1/stats/storage on
  // registry-management.
  rpc GetTenantStorageBreakdown(GetTenantStorageBreakdownRequest) returns (GetTenantStorageBreakdownResponse);

  // GetTenantUsage (FE-API-028) — single-shot aggregate covering the
  // metadata-owned pieces of the admin tenant-detail card: storage usage and
  // cap, repository count, organisation count. Computed via one CTE so the
  // admin endpoint never fans out across multiple metadata RPCs.
  //
  // Tenants whose row does not yet exist in metadata (lazy creation via the
  // UpdateTenantQuota UPSERT pattern, FE-API-031) return all-zero counts +
  // quota_bytes=0 rather than NotFound, so the management layer can stitch
  // the response together for newly-created tenants without push activity.
  rpc GetTenantUsage(GetTenantUsageRequest) returns (TenantUsage);

  // ─── FE-API-037: per-repo retention policy CRUD ─────────────────────────

  // GetRepoRetentionPolicy returns the policy attached to a repository, or
  // a typed NotFound when no policy row exists. The caller (registry-management)
  // is responsible for falling back to the org default (FE-API-039) when
  // NotFound is returned.
  rpc GetRepoRetentionPolicy(GetRepoRetentionPolicyRequest) returns (RetentionPolicy);

  // UpsertRepoRetentionPolicy creates or updates the policy. Setting
  // enabled=true with no existing preview_until causes the implementation
  // to set preview_until = now() + 24h (FE-API-038 mechanism). preview_until
  // is otherwise client-readonly — the caller cannot set it directly.
  rpc UpsertRepoRetentionPolicy(UpsertRepoRetentionPolicyRequest) returns (RetentionPolicy);

  // DeleteRepoRetentionPolicy removes the per-repo override; the repo then
  // falls back to the org default (FE-API-039).
  rpc DeleteRepoRetentionPolicy(DeleteRepoRetentionPolicyRequest) returns (google.protobuf.Empty);

  // ─── FE-API-038: retention policy dry-run + preview-window state ─────────
  //
  // EvaluateRetention is the read-only evaluation engine that powers both
  // the dry-run (operator inspects a candidate policy before saving) and the
  // preview-window state endpoint (UI countdown for an already-saved policy
  // sitting in its 24h preview window).
  //
  // The handler does NOT persist the candidate — it merely materialises which
  // manifests WOULD be selected for deletion (and which would be excluded by
  // a protected_tag_patterns regex) given the current manifest + tag state of
  // the repository. The executor (FE-API-040) is a separate ticket and is
  // the only path that actually deletes.
  //
  // Caps: the returned `would_delete` list is truncated to the smaller of
  // `max_delete_results` (default 1000, server cap 5000) and the full
  // candidate set. `total_count` / `total_bytes` always reflect the full set
  // (computed via SQL aggregate, not by counting the truncated slice) so the
  // UI can render "showing 1000 of 47 312 candidates" honestly.
  rpc EvaluateRetention(EvaluateRetentionRequest) returns (EvaluateRetentionResponse);

  // ─── FE-API-039: per-org default retention policy + inheritance ──────────

  // GetOrgRetentionPolicy returns the default retention policy attached to an
  // org, or NotFound when none exists. The shape is identical to
  // RetentionPolicy (with `org_id` populated and `repo_id` empty) so callers
  // can render both per-repo and per-org policies with the same UI code.
  rpc GetOrgRetentionPolicy(GetOrgRetentionPolicyRequest) returns (RetentionPolicy);

  // UpsertOrgRetentionPolicy creates or updates the org default policy. Same
  // preview_until semantics as UpsertRepoRetentionPolicy — the implementation
  // owns the 24h window when a default is enabled or its rules change
  // materially. The caller never sets preview_until directly.
  rpc UpsertOrgRetentionPolicy(UpsertOrgRetentionPolicyRequest) returns (RetentionPolicy);

  // DeleteOrgRetentionPolicy removes the org default. Repos that previously
  // inherited fall back to "no policy" until either a new default is set or
  // an explicit per-repo policy is created.
  rpc DeleteOrgRetentionPolicy(DeleteOrgRetentionPolicyRequest) returns (google.protobuf.Empty);

  // GetEffectiveRetentionPolicy resolves what policy actually applies to a
  // repository: the per-repo row if it exists, else the org default (only
  // when enabled = TRUE), else NotFound. The `inherited_from` field on the
  // response tells the BFF + UI whether to label the policy "(per-repo)" or
  // "(inherited from org default)" without a second round-trip. A disabled
  // org default deliberately does NOT propagate — falling back to a disabled
  // default would surface a confusing "no enforcement, but here's a default"
  // banner.
  rpc GetEffectiveRetentionPolicy(GetEffectiveRetentionPolicyRequest) returns (EffectiveRetentionPolicy);

  // ─── FE-API-040: retention executor support ─────────────────────────────────
  //
  // The executor lives in services/gc; these three RPCs are the metadata-side
  // primitives it needs. MarkManifestRetentionPending is the soft-delete write
  // (idempotent), ClearManifestRetentionPending is the undo write, and
  // ListPendingDeleteManifests is the "what's past grace?" read used by the
  // retention_grace finaliser sweep.

  // MarkManifestRetentionPending sets retention_pending_delete_at = NOW on a
  // single manifest. Called by services/gc's retention soft-delete pass for
  // every manifest in EvaluateRetention's would_delete output.
  //
  // Idempotent: if retention_pending_delete_at is already set, the existing
  // timestamp is preserved (a re-run does NOT extend the grace window).
  rpc MarkManifestRetentionPending(MarkManifestRetentionPendingRequest) returns (google.protobuf.Empty);

  // ClearManifestRetentionPending unmarks a manifest queued for retention
  // deletion. Used by the "undo" UI affordance during the grace window, and
  // also for tests that need to reset state between runs.
  rpc ClearManifestRetentionPending(ClearManifestRetentionPendingRequest) returns (google.protobuf.Empty);

  // ListPendingDeleteManifests returns manifests whose
  // retention_pending_delete_at is older than `grace_window_secs`. Called by
  // the retention_grace executor sweep to find candidates that have ridden
  // out their grace window and are ready for hard deletion.
  //
  // tenant_id may be empty to scan all tenants (used by the cross-tenant
  // grace ticker on services/gc); a non-empty tenant_id restricts the scan.
  // The repo-blob digests needed for storage.DeleteBlob calls are NOT
  // returned by this RPC — the executor calls DeleteManifest (existing RPC)
  // which already cascades to blob cleanup via the orphan path. Keeps this
  // RPC a single-table scan instead of an N-way join against blob_links.
  rpc ListPendingDeleteManifests(ListPendingDeleteManifestsRequest) returns (ListPendingDeleteManifestsResponse);

  // LookupOrgIDByName resolves an org name to its UUID within a tenant.
  // Read-only — unlike the repository-internal GetOrCreateOrganization
  // which has insert semantics, this RPC returns NotFound when the org
  // does not exist. Added in FE-API-039 so the management BFF can map
  // /api/v1/orgs/{org}/policies/retention URLs (which carry the org name)
  // to the org_id required by the per-org retention RPCs without an
  // unintended side-effect.
  rpc LookupOrgIDByName(LookupOrgIDByNameRequest) returns (LookupOrgIDByNameResponse);
}

message Repository {
  string repo_id       = 1;
  string org_id        = 2;
  string tenant_id     = 3;
  // name is the leaf repository name (e.g. "alpine"); the parent org's
  // human name lives in `org` for callers that want to render
  // "org/leaf" without a separate lookup.
  string name          = 4;
  bool   is_public     = 5;
  int64  storage_quota = 6;
  int64  storage_used  = 7;
  google.protobuf.Timestamp created_at = 8;
  // Parent organization's name, joined from `organizations.name`.
  // Surfaced so the management API can return `org` + `name` together.
  string org           = 9;
  // Operator-supplied markdown description / README for the repository.
  string description   = 10;
  // Tag immutability (futures.md Tier 1 #2). When true, services/core
  // rejects any PutManifest that would move an existing tag to a new
  // manifest_digest. A new tag (not yet existing) still creates fine —
  // immutability gates re-writes, not initial pushes. Defaults to false
  // so the flag is invisible to operators who never opt in.
  bool   immutable_tags = 11;
}

message Tag {
  string tag_id          = 1;
  string repo_id         = 2;
  string tenant_id       = 3;
  string name            = 4;
  string manifest_digest = 5;
  google.protobuf.Timestamp updated_at = 6;
  google.protobuf.Timestamp created_at = 7;
  // Total image size in bytes (config blob + sum of layer blob sizes for an
  // image manifest, or sum of child manifest sizes for an image index).
  // Computed at push time from the referenced manifest's raw JSON and
  // stored in `manifests.image_size_bytes`; 0 when the manifest is missing
  // or its JSON could not be parsed.
  int64 size_bytes       = 8;
  // REM-013 gap 1: surface the manifest's retention_pending_delete_at on
  // the tag row so the dashboard can render a "🗑 deletes in N days" pill
  // on the Tags table without a separate per-tag round-trip. Optional —
  // null when the referenced manifest has no pending delete stamp (which
  // is the default state).
  google.protobuf.Timestamp retention_pending_delete_at = 9;
  // FE-API-050 — surfaces the parent manifest's quarantined flag on the
  // tag row so the Tags table can render a 🔒 pill without a follow-up
  // GetManifest call per row. False when the manifest is not under a
  // scan-policy quarantine (the common case).
  bool quarantined = 10;
  // S-MAINT-1 Batch 5 (P6 + F4) — artifact-type discriminator derived
  // from the parent manifest's `config.mediaType`. One of:
  //   "image"     — OCI/Docker container image (common case)
  //   "helm"      — Helm 3 chart
  //   "signature" — Cosign signature / referrer
  //   "sbom"      — SPDX or CycloneDX SBOM attestation
  //   "other"     — recognised manifest media type, unknown config type
  //   ""          — config_media_type unknown (legacy row, NULL in DB)
  // Repository code maps raw mediaType -> discriminator so callers can't
  // accidentally couple to wire-shape mediaType strings; a new artifact
  // type added by the spec only needs a single mapping change.
  string artifact_type = 11;
  // Per-tag immutability pin (futures.md Tier 1 #2). When true, this
  // single tag cannot be moved to a new manifest_digest regardless of
  // the parent repository's `immutable_tags` setting. Lets an operator
  // lock down a canonical tag (e.g. "v1.0-release") without flipping
  // the whole repo's immutability. Default false.
  bool immutable = 12;
}

message Manifest {
  string manifest_id = 1;
  string repo_id     = 2;
  string tenant_id   = 3;
  string digest      = 4;
  string media_type  = 5;
  bytes  raw_json    = 6;
  int64  size_bytes  = 7;
  google.protobuf.Timestamp created_at = 8;
  // FE-API-050 — pull-time quarantine. quarantined=true means a pull
  // against this manifest must be rejected by registry-core with 451
  // Unavailable For Legal Reasons. quarantine_reason is operator-
  // readable text (e.g. "scan blocked by policy: 3 CRITICAL findings");
  // quarantined_at + quarantined_by track who/when so the audit trail
  // can show every transition. All four are null when the manifest is
  // not quarantined.
  bool   quarantined        = 9;
  string quarantine_reason  = 10;
  google.protobuf.Timestamp quarantined_at = 11;
  // quarantined_by is "scanner" for automatic policy enforcement, or
  // the user_id UUID when an operator quarantines manually. Empty
  // when not set.
  string quarantined_by     = 12;
  // S-MAINT-1 Batch 5 (P6 + F4) — raw `config.mediaType` extracted
  // from `raw_json` at push time. Indexed via the partial idx so the
  // "list this tenant's helm charts" query stays cheap. Empty when
  // the source manifest had no parseable config block.
  string config_media_type = 13;
  // S-MAINT-1 Batch 5 (P6 + F4) — derived discriminator. Same values
  // as Tag.artifact_type above. Repository code computes it from
  // config_media_type so wire consumers don't need to know the raw
  // mediaType taxonomy.
  string artifact_type = 14;
}

message BlobRef {
  string digest      = 1;
  int64  size_bytes  = 2;
  string storage_key = 3;
}

message QuotaUsage {
  string tenant_id    = 1;
  int64  used_bytes   = 2;
  int64  quota_bytes  = 3;
}

message ScanResult {
  string scan_id          = 1;
  string manifest_digest  = 2;
  string repo_id          = 3;
  string tenant_id        = 4;
  string scanner_name     = 5;
  string scanner_version  = 6;
  string status           = 7; // pending|running|complete|failed
  map<string, int32> severity_counts = 8;
  bytes  findings_json    = 9;
  google.protobuf.Timestamp started_at   = 10;
  google.protobuf.Timestamp completed_at = 11;
}

// Repository requests
message CreateRepositoryRequest {
  string org_id        = 1;
  string tenant_id     = 2;
  string name          = 3;
  bool   is_public     = 4;
  int64  storage_quota = 5;
  string description   = 6;
}
message UpdateRepositoryRequest {
  string repo_id     = 1;
  string tenant_id   = 2;
  string description = 3;
}
message GetRepositoryRequest { string repo_id = 1; string tenant_id = 2; }
message GetRepositoryByNameRequest {
  string tenant_id = 1;
  string name      = 2; // "org/repo" format
}
message ListRepositoriesRequest {
  string org_id     = 1;
  string tenant_id  = 2;
  string page_token = 3;
  int32  page_size  = 4;
  // S-MAINT-1 Batch 5 follow-up — narrow the list to repositories whose
  // manifests carry a specific artifact_type (image | helm | signature |
  // sbom | other). Empty = no filter; returns every repository in the
  // tenant. Repositories with no manifests at all are excluded when this
  // filter is non-empty, matching the spirit of "show me only repos that
  // hold artifacts of this kind". A repository that holds a mix
  // (e.g. image + chart) is returned for any matching filter value.
  string artifact_type = 5;
}
message DeleteRepositoryRequest { string repo_id = 1; string tenant_id = 2; }
message UpdateRepositoryQuotaRequest { string repo_id = 1; string tenant_id = 2; int64 storage_quota = 3; }
// Tag immutability (futures.md Tier 1 #2). `immutable_tags=true` makes
// every tag in the repo non-mutable: services/core's PutManifest will
// reject any push that would move an existing tag's manifest_digest.
// New-tag creation still works. Toggling back to false is allowed —
// the audit trail captures the transition so a future investigation
// can answer "who reopened this repo for re-pushes".
message UpdateRepositoryImmutabilityRequest {
  string repo_id        = 1;
  string tenant_id      = 2;
  bool   immutable_tags = 3;
}

// Tag requests
message PutTagRequest { string repo_id = 1; string tenant_id = 2; string name = 3; string manifest_digest = 4; }
message GetTagRequest { string repo_id = 1; string tenant_id = 2; string name = 3; }
message ListTagsRequest { string repo_id = 1; string tenant_id = 2; string page_token = 3; int32 page_size = 4; string last = 5; }
message DeleteTagRequest { string repo_id = 1; string tenant_id = 2; string name = 3; }
// Per-tag pin (futures.md Tier 1 #2). Independent of the repo-wide
// flag — a tag pinned to immutable=true cannot be moved even on a
// repo with immutable_tags=false. Untoggling back to immutable=false
// is allowed for explicit operator override.
message UpdateTagImmutableRequest {
  string repo_id   = 1;
  string tenant_id = 2;
  string name      = 3;
  bool   immutable = 4;
}

// Manifest requests
message PutManifestRequest { string repo_id = 1; string tenant_id = 2; string digest = 3; string media_type = 4; bytes raw_json = 5; int64 size_bytes = 6; }
message GetManifestRequest { string repo_id = 1; string tenant_id = 2; string reference = 3; }
message DeleteManifestRequest { string repo_id = 1; string tenant_id = 2; string digest = 3; }

// FE-API-050 — quarantine state transition. tenant_id is enforced
// server-side via the WHERE clause; a malformed manifest_id from
// another tenant can't quarantine a foreign manifest. quarantined=true
// requires a non-empty reason (server-validated) so the audit trail
// always carries an explanation; quarantined=false ignores the reason.
// quarantined_by is "scanner" for automatic policy enforcement, or the
// caller's user_id UUID for operator-triggered transitions.
message UpdateManifestQuarantineRequest {
  string tenant_id        = 1;
  string repo_id          = 2;
  string manifest_digest  = 3;
  bool   quarantined      = 4;
  string reason           = 5;
  string quarantined_by   = 6;
}
message ListUntaggedManifestsRequest { string repo_id = 1; string tenant_id = 2; string page_token = 3; int32 page_size = 4; }

// Blob requests
message LinkBlobRequest { string repo_id = 1; string blob_digest = 2; int64 size_bytes = 3; string storage_key = 4; }
message UnlinkBlobRequest { string repo_id = 1; string blob_digest = 2; }
message ListOrphanedBlobsRequest { string tenant_id = 1; }

// Quota requests
message GetTenantQuotaUsageRequest { string tenant_id = 1; }
message UpdateTenantQuotaRequest { string tenant_id = 1; int64 quota_bytes = 2; }
message IncrementTenantStorageRequest { string tenant_id = 1; int64 bytes = 2; }
message DecrementTenantStorageRequest { string tenant_id = 1; int64 bytes = 2; }

// Scan requests
//
// UpdateScanStatusRequest is the scanner's write-back to metadata. The
// row is upserted on scan_id so the first call (status="running" or
// "complete") creates the row and subsequent calls update it — there's
// no separate Create RPC. Fields 6-9 are required to satisfy the
// scan_results NOT NULL columns on the initial insert; subsequent
// updates may leave them empty and the existing values are kept.
message UpdateScanStatusRequest {
  string scan_id = 1;
  string tenant_id = 2;
  string status = 3;
  bytes findings_json = 4;
  map<string, int32> severity_counts = 5;
  string repo_id = 6;
  string manifest_digest = 7;
  string scanner_name = 8;
  string scanner_version = 9;
}
message GetScanResultRequest { string manifest_digest = 1; string repo_id = 2; string tenant_id = 3; }

// ─── FE-API-033: per-tag SBOM storage ────────────────────────────────────────

// UpsertScanSBOMRequest persists an SBOM blob on the latest scan_results row
// for (tenant_id, manifest_digest). `format` is one of "spdx-json" or
// "cyclonedx-json"; only "spdx-json" is implemented in v1, but the field is
// stored verbatim so future formats can land without a schema bump.
message UpsertScanSBOMRequest {
  string tenant_id        = 1;
  string manifest_digest  = 2;
  string format           = 3; // "spdx-json" (v1) or "cyclonedx-json" (future)
  bytes  sbom_json        = 4;
}

// GetScanSBOMRequest fetches the SBOM bytes for the latest scan of a manifest.
message GetScanSBOMRequest {
  string tenant_id        = 1;
  string manifest_digest  = 2;
}

// GetScanSBOMResponse returns the stored SBOM bytes + format. Servers return
// gRPC NotFound when either no scan row exists for the manifest in the
// tenant, or the row exists but has no SBOM persisted yet (sbom_json IS NULL).
message GetScanSBOMResponse {
  string format    = 1; // "spdx-json" | "cyclonedx-json"
  bytes  sbom_json = 2;
}

// Vulnerability count requests
message GetTenantVulnerabilityCountRequest { string tenant_id = 1; }
message VulnerabilityCountResponse {
  int64 total              = 1;
  int64 critical_count     = 2;
  int64 high_count         = 3;
  int64 medium_count       = 4;
  int64 low_count          = 5;
  int64 negligible_count   = 6;
}

// Repository count requests
message CountRepositoriesRequest { string tenant_id = 1; }
message CountRepositoriesResponse { int64 count = 1; }

// Security overview requests (FE-API-020).
message GetSecurityOverviewRequest { string tenant_id = 1; }

// SecurityCounts is the per-severity breakdown used by both StatsResponse
// (FE-API-016) and SecurityOverview (FE-API-020). Counts are aggregated across
// the latest complete scan per tag — never summed across multiple scans for
// the same tag.
message SecurityCounts {
  int32 critical   = 1;
  int32 high       = 2;
  int32 medium     = 3;
  int32 low        = 4;
  int32 negligible = 5;
}

// ScanCoverage describes how much of the tenant's tag inventory has at least
// one scan_result row. percent is `tags_scanned / tags_total * 100`, or 0 when
// `tags_total == 0`.
message ScanCoverage {
  int64  tags_total   = 1;
  int64  tags_scanned = 2;
  double percent      = 3;
}

// SecurityOverview is the single payload returned by GetSecurityOverview.
//
// open_vulnerabilities_total mirrors VulnerabilityCountResponse.total but is
// computed from the per-tag latest scan to match the dashboard severity bar.
// days_since_last_scan is 0 when the tenant has never been scanned (callers
// can distinguish via recent_scans_24h == 0 and tags_scanned == 0).
message SecurityOverview {
  int64           open_vulnerabilities_total = 1;
  SecurityCounts  severity_counts            = 2;
  ScanCoverage    scan_coverage              = 3;
  int64           recent_scans_24h           = 4;
  int64           days_since_last_scan       = 5;
}

// ─── FE-API-014: workspace-wide vulnerabilities ─────────────────────────────

// AffectedTag identifies a (repo, tag, manifest_digest) combination affected
// by a particular CVE. Aggregated across the latest scan per tag.
message AffectedTag {
  string repo   = 1; // "org/name" composite, ready for the dashboard
  string tag    = 2;
  string digest = 3; // manifest digest
}

// TenantVulnerability is one CVE rolled up across every tag where it appears
// in the latest scan. `affected` is the list of (repo, tag, digest) tuples
// the CVE touches. `first_seen` / `last_seen` are the min/max scan
// completion timestamps across those tuples.
message TenantVulnerability {
  string                    cve_id          = 1;
  string                    severity        = 2; // CRITICAL|HIGH|MEDIUM|LOW|NEGLIGIBLE
  string                    title           = 3;
  string                    description     = 4;
  string                    fixed_in        = 5;
  string                    package_name    = 6;
  string                    package_version = 7;
  repeated AffectedTag      affected        = 8;
  google.protobuf.Timestamp first_seen      = 9;
  google.protobuf.Timestamp last_seen       = 10;
}

message ListTenantVulnerabilitiesRequest {
  string tenant_id  = 1;
  // severity is an optional filter; "" means all severities.
  // Valid values: CRITICAL|HIGH|MEDIUM|LOW|NEGLIGIBLE.
  string severity   = 2;
  // page_token is an opaque cursor returned by a previous call. Internally
  // base64(severity_rank|cve_id).
  string page_token = 3;
  // page_size caps results per call (default 50, max 200 enforced server-side).
  int32  page_size  = 4;
}

message ListTenantVulnerabilitiesResponse {
  repeated TenantVulnerability vulnerabilities  = 1;
  string                       next_page_token  = 2;
}

// ─── FE-API-015: scan history ───────────────────────────────────────────────

// ScanHistoryEntry mirrors one scan_results row enriched with repo + tag
// context. `tag` may be empty when the digest is no longer tagged in any
// repository (e.g. tag was retagged after the scan ran).
message ScanHistoryEntry {
  string                    scan_id         = 1;
  string                    repo            = 2; // "org/name" composite
  string                    tag             = 3;
  string                    manifest_digest = 4;
  string                    scanner         = 5; // scanner name (e.g. "trivy")
  google.protobuf.Timestamp started_at      = 6;
  google.protobuf.Timestamp completed_at    = 7;
  string                    status          = 8; // pending|running|complete|failed
  SecurityCounts            severity_counts = 9;
  string                    trigger         = 10; // push|manual|scheduled
}

message ListScanHistoryRequest {
  string                    tenant_id  = 1;
  // since filters scans whose completed_at >= since. Optional;
  // default applied server-side (30 days ago).
  google.protobuf.Timestamp since      = 2;
  // page_token is an opaque keyset cursor over (completed_at, scan_id) DESC.
  string                    page_token = 3;
  // page_size caps results per call (default 50, max 200).
  int32                     page_size  = 4;
}

message ListScanHistoryResponse {
  repeated ScanHistoryEntry scans            = 1;
  string                    next_page_token  = 2;
}

// ─── FE-API-017: remediation suggestions ────────────────────────────────────

// RemediationAffected identifies one (repo, tag, digest) tuple where a
// remediation grouping applies. `tag` is empty when the manifest_digest is
// no longer tagged at the time of the latest scan.
message RemediationAffected {
  string repo   = 1; // "org/name" composite
  string tag    = 2;
  string digest = 3; // manifest digest
}

// Remediation describes one actionable upgrade grouping: bumping
// `package_name` from `from_version` to `to_version` would fix every CVE
// listed in `cves_fixed`. `affected` is a deduplicated list of (repo, tag,
// digest) tuples where this upgrade applies, capped at 10 entries server-
// side (full count in `affected_count`). `max_severity` is the worst
// severity across the grouped findings.
message Remediation {
  string                       package_name      = 1;
  string                       from_version      = 2;
  string                       to_version        = 3;
  repeated string              cves_fixed        = 4;
  int32                        cves_fixed_count  = 5;
  string                       max_severity      = 6; // CRITICAL|HIGH|MEDIUM|LOW|NEGLIGIBLE
  repeated RemediationAffected affected          = 7;
  int32                        affected_count    = 8;
}

message ListTenantRemediationsRequest {
  string tenant_id  = 1;
  // page_token is an opaque cursor returned by a previous call. Internally
  // base64(max_severity_rank|-cves_fixed_count|package_name|from_version|to_version).
  string page_token = 2;
  // page_size caps results per call (default 50, max 200 enforced server-side).
  int32  page_size  = 3;
}

message ListTenantRemediationsResponse {
  repeated Remediation remediations    = 1;
  string               next_page_token = 2;
}

// ─── FE-API-031: per-repo storage breakdown ─────────────────────────────────

// RepositoryStorageEntry is one row in GetTenantStorageBreakdownResponse.
// `percent_of_tenant` is 100 * storage_used_bytes / tenant_storage_used_bytes
// (0.0 when tenant total is 0). Always materialised server-side so
// clients render identical numbers across all surfaces.
message RepositoryStorageEntry {
  string repo_id            = 1;
  string org                = 2;
  string name               = 3;
  int64  storage_used_bytes = 4;
  double percent_of_tenant  = 5;
}

message GetTenantStorageBreakdownRequest {
  string tenant_id = 1;
}

// GetTenantStorageBreakdownResponse returns the tenant's total storage and
// the top-50 repos by storage usage. Capped server-side; no pagination —
// the top-N is itself the answer to the "where is my storage going" UI
// question. Add pagination later if a use case emerges.
message GetTenantStorageBreakdownResponse {
  int64                           tenant_storage_used_bytes = 1;
  repeated RepositoryStorageEntry repositories              = 2;
}

// ─── FE-API-028: tenant usage aggregate ─────────────────────────────────────

message GetTenantUsageRequest { string tenant_id = 1; }

// TenantUsage aggregates the metadata-owned slice of the admin tenant-detail
// response. user_count is intentionally NOT here — it lives in
// services/auth's CountTenantUsers. Storage values mirror QuotaUsage so the
// dashboard can fall back on this RPC alone when it does not need the full
// tenant-detail composition.
message TenantUsage {
  int64 storage_used_bytes  = 1;
  int64 storage_quota_bytes = 2;
  int64 repository_count    = 3;
  int64 organization_count  = 4;
}

// ─── FE-API-037: per-repo retention policy CRUD ────────────────────────────

// RetentionRule is a single rule entry on a retention policy. `kind` matches
// the retention_rule_kind enum string (one of max_age_days, max_count,
// max_size_bytes, dangling_grace_days, max_idle_days). `value` is the
// per-kind threshold — days, count, or bytes — interpretation lives in the
// executor (FE-API-040). The kind enum already includes max_idle_days even
// though FE-API-040 cannot enforce it yet; the API persists it so FE-API-043
// can light it up without a schema change.
message RetentionRule {
  string kind  = 1; // matches retention_rule_kind enum strings
  int64  value = 2; // days / count / bytes — interpretation per kind
}

// RetentionPolicy is the wire form of one retention_policies row. `enabled`
// gates the executor; `rules` is the ordered list of {kind, value} pairs;
// `protected_tag_patterns` is the regex allowlist that protects e.g. release
// tags from eviction; `preview_until` is the dry-run window (set when a
// previously-disabled policy is enabled or rules change materially, otherwise
// zero). The caller never sets preview_until directly — the implementation
// owns it.
message RetentionPolicy {
  string                     repo_id                = 1;
  string                     tenant_id              = 2;
  bool                       enabled                = 3;
  repeated RetentionRule     rules                  = 4;
  repeated string            protected_tag_patterns = 5;
  google.protobuf.Timestamp  preview_until          = 6; // zero when not in preview
  google.protobuf.Timestamp  created_at             = 7;
  google.protobuf.Timestamp  updated_at             = 8;
  string                     updated_by             = 9; // user_id UUID
  // FE-API-039: org_id is populated when this message represents an org
  // default (repo_id is empty in that case) OR when an effective lookup
  // resolved to an org default. For a per-repo policy, repo_id is set and
  // org_id is empty. Reusing the same message keeps the read shape
  // consistent so the UI doesn't need a parallel OrgRetentionPolicy type.
  string                     org_id                 = 10;
}

message GetRepoRetentionPolicyRequest {
  string repo_id   = 1;
  string tenant_id = 2;
}

// UpsertRepoRetentionPolicyRequest is the full-replace shape for the policy.
// updated_by is the JWT-derived user_id forwarded by registry-management.
// Note: clients cannot send preview_until — the metadata implementation sets
// it when enabling a previously-disabled policy (FE-API-038 trigger).
message UpsertRepoRetentionPolicyRequest {
  string                  repo_id                = 1;
  string                  tenant_id              = 2;
  bool                    enabled                = 3;
  repeated RetentionRule  rules                  = 4;
  repeated string         protected_tag_patterns = 5;
  string                  updated_by             = 6;
}

message DeleteRepoRetentionPolicyRequest {
  string repo_id   = 1;
  string tenant_id = 2;
}

// ─── FE-API-038: retention policy dry-run + preview-window state ───────────

// RetentionPolicyCandidate is the policy shape passed to EvaluateRetention.
// It mirrors the persisted policy on the rules + protected_tag_patterns axes
// but is NEVER written to the DB by this RPC — the evaluator only reads from
// the manifests/tags tables. For the preview-window endpoint, the management
// BFF loads the saved row and passes it through this same field so the
// metadata API surface stays small (one read path, one write path).
message RetentionPolicyCandidate {
  bool                   enabled                = 1;
  repeated RetentionRule rules                  = 2;
  repeated string        protected_tag_patterns = 3;
}

// RetentionDeletionCandidate is one manifest the evaluator would select for
// deletion under the candidate policy. `reasons` is the list of rule kinds
// that selected it — a manifest can match multiple rules (e.g. both
// max_age_days and max_count) and the UI surfaces all of them so the
// operator understands why each candidate appears.
message RetentionDeletionCandidate {
  string                    manifest_id     = 1;
  string                    manifest_digest = 2;
  repeated string           tags            = 3;
  google.protobuf.Timestamp pushed_at       = 4;
  int64                     size_bytes      = 5;
  repeated string           reasons         = 6;
}

// RetentionProtectedManifest is one manifest the evaluator excluded because
// at least one of its tags matched a protected_tag_patterns regex. Only the
// FIRST matching pattern is returned — the UI just needs to show "skipped
// because tag X matched pattern Y", not the full intersection.
message RetentionProtectedManifest {
  string          manifest_id     = 1;
  string          manifest_digest = 2;
  repeated string tags            = 3;
  string          matched_pattern = 4;
}

// EvaluateRetentionRequest carries the candidate policy + caps. `repo_id`
// scopes the manifest set; tenant_id is required for RLS even though every
// manifest is already FK-attached to repositories.tenant_id.
//
// `max_delete_results` defaults to 1000 server-side and is clamped to
// [1, 5000]. `max_protected_results` defaults to 100 and is clamped to
// [1, 500]. Clamping happens in the handler so a hostile client cannot
// trick the evaluator into materialising a huge response.
message EvaluateRetentionRequest {
  string                   repo_id               = 1;
  string                   tenant_id             = 2;
  RetentionPolicyCandidate candidate             = 3;
  int32                    max_delete_results    = 4;
  int32                    max_protected_results = 5;
}

// EvaluateRetentionResponse contains the materialised dry-run output.
// `total_count` / `total_bytes` reflect the full set even when
// `would_delete` is truncated — the UI relies on this to render an
// honest counter. `truncated` is set when `would_delete` was capped;
// the protected list is capped without a flag because the dashboard
// doesn't render protected-skipped as a primary affordance.
message EvaluateRetentionResponse {
  repeated RetentionDeletionCandidate would_delete      = 1;
  repeated RetentionProtectedManifest protected_skipped = 2;
  int64                               total_count       = 3;
  int64                               total_bytes       = 4;
  google.protobuf.Timestamp           evaluated_at      = 5;
  bool                                truncated         = 6;
}

// ─── FE-API-039: per-org default retention policy + inheritance ────────────

// GetOrgRetentionPolicyRequest scopes to (org_id, tenant_id). The lookup
// returns NotFound when no default row exists; the BFF maps NotFound to a
// typed 404 ("no-org-default") so the UI can render the empty state.
message GetOrgRetentionPolicyRequest {
  string org_id    = 1;
  string tenant_id = 2;
}

// UpsertOrgRetentionPolicyRequest is the full-replace shape for the org
// default. The same fields as UpsertRepoRetentionPolicyRequest, swapping
// repo_id for org_id. updated_by is the JWT-derived user_id forwarded by
// registry-management; preview_until is owned server-side.
message UpsertOrgRetentionPolicyRequest {
  string                  org_id                 = 1;
  string                  tenant_id              = 2;
  bool                    enabled                = 3;
  repeated RetentionRule  rules                  = 4;
  repeated string         protected_tag_patterns = 5;
  string                  updated_by             = 6;
}

message DeleteOrgRetentionPolicyRequest {
  string org_id    = 1;
  string tenant_id = 2;
}

// GetEffectiveRetentionPolicyRequest asks "what policy would apply to this
// repo right now?" The repo_id and tenant_id together scope the lookup; the
// implementation resolves the per-repo row first, then falls back to the
// repo's parent org default (only when enabled = TRUE), then NotFound.
message GetEffectiveRetentionPolicyRequest {
  string repo_id   = 1;
  string tenant_id = 2;
}

// EffectiveRetentionPolicy wraps the resolved policy with the inheritance
// label so the BFF + UI know whether to render "per-repo" or "inherited
// from org default" without a second lookup.
//
// `inherited_from` is "repo" when the resolution found a per-repo row,
// "org" when it fell back to the org default. `org_id` is populated only
// when `inherited_from == "org"` so the UI can link "(inherited from
// myorg)" cleanly without an extra repository → org lookup.
message EffectiveRetentionPolicy {
  RetentionPolicy policy         = 1;
  string          inherited_from = 2; // "repo" | "org"
  string          org_id         = 3; // populated when inherited_from == "org"
}

// LookupOrgIDByNameRequest scopes to (tenant_id, name). The lookup is
// read-only — NotFound when no organization row matches.
message LookupOrgIDByNameRequest {
  string tenant_id = 1;
  string name      = 2;
}

message LookupOrgIDByNameResponse {
  string org_id = 1;
}

// ─── FE-API-040: retention executor messages ──────────────────────────────────

message MarkManifestRetentionPendingRequest {
  string manifest_id = 1;
  string tenant_id   = 2;
}

message ClearManifestRetentionPendingRequest {
  string manifest_id = 1;
  string tenant_id   = 2;
}

// ListPendingDeleteManifestsRequest:
//   - tenant_id: empty scans all tenants (admin / cross-tenant grace ticker),
//     non-empty restricts the scan to a single tenant.
//   - grace_window_secs: rows with retention_pending_delete_at < NOW -
//     grace_window_secs survive. Clamped to >= 0 server-side.
//   - limit: bounded by the executor at [1, 5000] with a default of 1000 so
//     a single sweep can't materialise an unbounded result set.
message ListPendingDeleteManifestsRequest {
  string tenant_id         = 1;
  int64  grace_window_secs = 2;
  int32  limit             = 3;
}

message ListPendingDeleteManifestsResponse {
  repeated PendingDeleteManifest manifests = 1;
}

// PendingDeleteManifest carries the fields the retention_grace executor
// needs to call DeleteManifest. blob_digests is intentionally NOT included
// — DeleteManifest cascades to the orphan-blob path, so the executor does
// not need to enumerate layers here. Keeping the payload narrow lets the
// scan stay on idx_manifests_retention_pending without joining blob_links.
message PendingDeleteManifest {
  string                    manifest_id   = 1;
  string                    tenant_id     = 2;
  string                    repository_id = 3;
  string                    digest        = 4;
  int64                     size_bytes    = 5;
  google.protobuf.Timestamp pending_since = 6;
}
