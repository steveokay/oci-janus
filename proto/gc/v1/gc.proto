// FE-API-032 — GC status visibility.
//
// Surfaces three RPCs the management BFF wraps as REST endpoints:
//
//   - GetStatus  — current/last GC run summary for the dashboard.
//   - RunNow     — platform-admin trigger for an immediate sweep.
//   - ListRuns   — paginated history of recent runs.
//
// The garbage collector itself runs as a cron loop (registry-gc) and is
// driven by the existing collector package. This service adds a thin
// persistence + control plane around it; the GC algorithm is untouched.
syntax = "proto3";

package registry.gc.v1;

option go_package = "github.com/steveokay/oci-janus/proto/gen/go/gc/v1;gcv1";

import "google/protobuf/timestamp.proto";

// GCService exposes the FE-API-032 status surface.
service GCService {
  // GetStatus returns a snapshot of the most recent GC run plus a
  // best-effort hint of when the next scheduled sweep is due. Safe to
  // return zero-valued fields when no runs have ever completed (e.g. a
  // freshly bootstrapped service) — the BFF maps that to a "no runs yet"
  // dashboard card without a separate code path.
  rpc GetStatus(GetStatusRequest) returns (GCStatus);

  // RunNow enqueues an immediate GC sweep. The call returns as soon as
  // the row is INSERTed in `gc_runs` with status=queued — actual
  // execution happens out of band when the GC loop's dispatcher picks
  // up the new row. Multiple workers coordinate via the existing
  // per-tenant `pg_try_advisory_lock` from REM-009, so RunNow is safe
  // to call while a scheduled sweep is in flight.
  rpc RunNow(RunNowRequest) returns (RunNowResponse);

  // ListRuns returns recent runs ordered by completed_at DESC NULLS LAST
  // so an in-flight run sits at the top of the list. Pagination is
  // opaque base64 keyset on (completed_at, run_id).
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);

  // ─── FE-API-040: retention executor ─────────────────────────────────────────

  // TriggerRetentionRun queues a soft-delete pass for a specific repository.
  // The CronLoop dispatcher picks up the queued row, calls
  // metadata.GetEffectiveRetentionPolicy + metadata.EvaluateRetention against
  // the saved policy, and marks every matched manifest with
  // retention_pending_delete_at. Returns the run_id immediately; the run
  // executes asynchronously.
  //
  // A separate RPC (rather than overloading RunNow) because the semantics
  // differ: RunNow is tenant-wide and platform-admin-only, TriggerRetentionRun
  // is repo-scoped and gated on repo admin / owner.
  rpc TriggerRetentionRun(TriggerRetentionRunRequest) returns (TriggerRetentionRunResponse);

  // GetRetentionRunStatus reads back a single retention run row by id. Lets
  // a repo admin poll their own retention sweeps without needing the
  // platform-admin marker required by ListRuns.
  rpc GetRetentionRunStatus(GetRetentionRunStatusRequest) returns (RetentionRunSummary);

  // GetTenantRetentionSavings returns lifetime bytes reclaimed by retention
  // for a tenant — the SUM of bytes_freed over succeeded retention /
  // retention_grace gc_runs. Read-only aggregate that feeds the dashboard
  // storage-breakdown card so operators can see how much retention has
  // actually saved (REM-013 gap 3).
  rpc GetTenantRetentionSavings(GetTenantRetentionSavingsRequest) returns (TenantRetentionSavings);
}

// GCStatus describes the latest GC run summary and the next scheduled
// tick. All `last_run_*` fields are zero/empty when no rows exist yet.
message GCStatus {
  // last_run_id is the UUID of the most recent row, empty when no rows
  // exist yet.
  string                    last_run_id              = 1;
  // last_run_mode mirrors the gc_run_mode enum: dry-run | manifests |
  // blobs | full.
  string                    last_run_mode            = 2;
  // last_run_status mirrors the gc_run_status enum: queued | running |
  // succeeded | failed.
  string                    last_run_status          = 3;
  google.protobuf.Timestamp last_run_started_at      = 4;
  google.protobuf.Timestamp last_run_completed_at    = 5;
  int64                     last_run_duration_ms     = 6;
  int64                     last_run_blobs_freed     = 7;
  int64                     last_run_manifests_deleted = 8;
  int64                     last_run_bytes_freed     = 9;
  string                    last_run_error           = 10;
  // last_run_triggered_by is `cron` for scheduled sweeps or a user_id
  // (UUID string) for manual `RunNow` invocations.
  string                    last_run_triggered_by    = 11;
  // next_scheduled_at is a best-effort projection derived from the
  // configured GC_RUN_INTERVAL_HOURS and the last completion time. It is
  // intentionally not authoritative — the cron loop ticks against its
  // own internal timer, not this field.
  google.protobuf.Timestamp next_scheduled_at        = 12;
  // retention_grace_days is the soft-delete grace window (GC's
  // RETENTION_GRACE_DAYS): the number of days a manifest sits with
  // retention_pending_delete_at set before the retention_grace sweep hard-
  // deletes it. This is GC's single source of truth for the window; the BFF
  // surfaces it so the dashboard can render an accurate pending-delete ETA
  // instead of hardcoding the default. 0 means "unknown / not reported".
  int32                     retention_grace_days     = 13;
}

// GCRun is one historical or in-flight sweep row.
message GCRun {
  string                    run_id              = 1;
  string                    mode                = 2;
  string                    status              = 3;
  google.protobuf.Timestamp requested_at        = 4;
  google.protobuf.Timestamp started_at          = 5;
  google.protobuf.Timestamp completed_at        = 6;
  int64                     duration_ms         = 7;
  int64                     blobs_freed         = 8;
  int64                     manifests_deleted   = 9;
  int64                     bytes_freed         = 10;
  string                    error_message       = 11;
  string                    triggered_by        = 12;
}

// GetStatusRequest is empty — status is global, not per-tenant. The
// BFF gates this on platform-admin so callers can't probe other
// tenants' runs by id either.
message GetStatusRequest {}

message RunNowRequest {
  // mode is the requested gc_run_mode. Validated against an allowlist on
  // the handler.
  string mode         = 1;
  // triggered_by is the caller's user_id (UUID string). Logged onto the
  // `gc_runs.triggered_by` column so the audit trail records who kicked
  // off each manual sweep.
  string triggered_by = 2;
}

message RunNowResponse {
  string run_id = 1;
  // status is always `queued` at create time — actual progress is
  // observed via GetStatus / ListRuns.
  string status = 2;
}

message ListRunsRequest {
  // page_size defaults to 50 on the handler when zero; capped to 200
  // server-side regardless of caller intent.
  int32  page_size  = 1;
  // page_token is opaque to the caller. It is a base64url encoding of
  // `completed_at|run_id` produced by the previous response. Bad
  // tokens map to INVALID_ARGUMENT.
  string page_token = 2;
  // REM-013 gap 2 — optional filters. Empty values preserve the
  // pre-REM-013 behaviour (no filter applied) so existing callers keep
  // working unchanged.
  //
  // repo_id scopes the list to one repository. Required for the per-repo
  // Retention tab's "Run history" panel; ignored on the platform-admin
  // /admin/gc/runs route.
  //
  // modes filters by gc_run_mode. The per-repo route passes
  // ["retention", "retention_grace"] so the listing only shows retention
  // executor rows; the existing /admin/gc/runs route passes an empty
  // slice for "all modes".
  string repo_id = 3;
  repeated string modes = 4;
  // S-MAINT-1 F2 — server-side search across the GC + Retention admin
  // tiles. All three filters are optional; empty values preserve the
  // pre-F2 behaviour.
  //
  // triggered_by is a case-insensitive substring match against the
  // gc_runs.triggered_by column (which stores the actor's user_id as
  // text for cron-triggered runs the column is empty; "cron" matches it
  // via the explicit COALESCE in the SQL layer). Matches both manual-
  // run actors and the literal "cron" label.
  //
  // date_from / date_to are RFC3339 timestamps that scope the listing
  // to runs whose anchor timestamp falls inside the half-open interval
  // [date_from, date_to). The anchor is COALESCE(completed_at,
  // started_at, requested_at) so an in-flight queued run still falls
  // into the right bucket. Either or both may be empty.
  string triggered_by = 5;
  string date_from    = 6;
  string date_to      = 7;
}

message ListRunsResponse {
  repeated GCRun runs            = 1;
  string         next_page_token = 2;
}

// ─── FE-API-040: retention executor messages ──────────────────────────────────

// TriggerRetentionRunRequest scopes a retention sweep to one repository.
// `triggered_by` is the caller's user_id (UUID), forwarded by the BFF after
// the repo admin / owner gate fires.
message TriggerRetentionRunRequest {
  string repo_id      = 1;
  string tenant_id    = 2;
  string triggered_by = 3; // user_id UUID
}

message TriggerRetentionRunResponse {
  string run_id = 1;
  string status = 2; // always "queued"
}

message GetRetentionRunStatusRequest {
  string run_id    = 1;
  string tenant_id = 2;
}

// RetentionRunSummary mirrors the gc_runs row for retention modes. The shape
// overlaps with GCRun deliberately — retention runs are stored in the same
// table as the existing dry-run / manifests / blobs sweeps — but the fields
// most relevant to retention are surfaced explicitly so the dashboard does
// not have to overload `manifests_deleted` to mean two different things
// depending on `mode`.
message RetentionRunSummary {
  string                    run_id              = 1;
  string                    repo_id             = 2;
  string                    mode                = 3; // "retention" | "retention_grace"
  string                    status              = 4; // queued | running | succeeded | failed
  google.protobuf.Timestamp requested_at        = 5;
  google.protobuf.Timestamp started_at          = 6;
  google.protobuf.Timestamp completed_at        = 7;
  int64                     manifests_marked    = 8;  // populated when mode = retention
  int64                     manifests_deleted   = 9;  // populated when mode = retention_grace
  int64                     blobs_freed         = 10; // populated when mode = retention_grace
  int64                     bytes_freed         = 11; // populated when mode = retention_grace
  string                    error_message       = 12;
  string                    triggered_by        = 13;
}

// GetTenantRetentionSavingsRequest asks for the lifetime retention savings
// aggregate for a single tenant (REM-013 gap 3).
message GetTenantRetentionSavingsRequest {
  string tenant_id = 1;
}

// TenantRetentionSavings is the aggregate over a tenant's succeeded
// retention-mode gc_runs. All counters are zero (and last_run_at nil) when the
// tenant has never had a retention sweep complete.
message TenantRetentionSavings {
  string                    tenant_id         = 1;
  int64                     reclaimed_bytes   = 2; // SUM(bytes_freed) over succeeded retention runs
  int64                     manifests_deleted = 3; // SUM(manifests_deleted)
  int64                     run_count         = 4; // succeeded retention runs counted — includes both 'retention' (mark-only, 0-byte) and 'retention_grace' (hard-delete) passes
  google.protobuf.Timestamp last_run_at       = 5; // completed_at of the most recent counted run (nil if none)
}
