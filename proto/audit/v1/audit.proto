syntax = "proto3";

package registry.audit.v1;

option go_package = "github.com/steveokay/oci-janus/proto/gen/go/audit/v1;auditv1";

import "google/protobuf/timestamp.proto";

// AuditService exposes query operations over the append-only audit event store.
service AuditService {
  // GetBuildHistory returns the most recent push/build audit events for a
  // specific tenant repository and tag, ordered newest-first.
  rpc GetBuildHistory(GetBuildHistoryRequest) returns (GetBuildHistoryResponse);

  // GetDailyPullCount returns the number of pull.image events for a tenant
  // in the past 24 hours. Used by registry-management to populate the
  // DailyPulls stat tile on the operations overview dashboard.
  rpc GetDailyPullCount(GetDailyPullCountRequest) returns (GetDailyPullCountResponse);

  // GetRepoActivity returns operator-facing audit events for a single
  // repository (push, delete, scan, sign — never internal queue noise).
  // Results are ordered newest-first and cursor-paginated. The payload field
  // exposes only a curated handful of fields per event so the full raw
  // payload never crosses the gRPC wire.
  rpc GetRepoActivity(GetRepoActivityRequest) returns (GetRepoActivityResponse);

  // GetNotifications returns recent operator-facing audit events scoped to a
  // whole tenant (not a single repository) so the management dashboard can
  // populate the topbar bell + notifications drawer. The allowlist of event
  // types is the superset of repo-scoped activity events plus webhook delivery
  // failures, deliberately omitting internal queue/plumbing noise. As with
  // GetRepoActivity, the raw payload is projected server-side into a small
  // set of safe fields plus a human-readable title/summary/link.
  //
  // FE-API-008. Polled by the dashboard at a fixed interval (see frontend);
  // there is no per-user "read" state stored on the backend — clients persist
  // a last_seen_at timestamp locally and compute unread by filtering on it.
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse);

  // GetLastTenantPush (FE-API-028) returns the most recent push.image
  // audit event for the tenant. last_push_at is unset (zero timestamp) when
  // the tenant has never recorded a push. Backs the "last activity" line on
  // the admin tenant-detail card.
  rpc GetLastTenantPush(GetLastTenantPushRequest) returns (GetLastTenantPushResponse);
}

// GetBuildHistoryRequest filters build history for a specific tag in a repository.
message GetBuildHistoryRequest {
  // tenant_id scopes the query to prevent cross-tenant data leakage.
  string tenant_id = 1;
  // repo_id is the UUID of the repository as stored in registry-metadata.
  string repo_id   = 2;
  // tag is the tag name to filter history by (e.g. "latest").
  string tag       = 3;
  // limit caps the number of returned records; 0 means use the service default (25).
  int32  limit     = 4;
}

// BuildRecord represents a single push or build event from the audit trail.
message BuildRecord {
  // build_id is the UUID of the audit event row.
  string build_id      = 1;
  // status is derived from the audit outcome field ("success" | "failure").
  string status        = 2;
  // commit_hash is extracted from the event metadata.commit_hash field if present.
  string commit_hash   = 3;
  // triggered_by is the actor_id that performed the push.
  string triggered_by  = 4;
  // duration is a human-readable string extracted from event metadata (e.g. "3m 45s").
  string duration      = 5;
  // occurred_at is the timestamp of the audit event.
  google.protobuf.Timestamp occurred_at = 6;
}

// GetBuildHistoryResponse contains the list of build records and the total count.
message GetBuildHistoryResponse {
  repeated BuildRecord builds = 1;
  // total is the count of records returned (not the total in the database).
  int32 total                 = 2;
}

// GetDailyPullCountRequest scopes the pull count to a single tenant.
message GetDailyPullCountRequest {
  // tenant_id scopes the query to prevent cross-tenant data leakage.
  string tenant_id = 1;
}

// GetDailyPullCountResponse carries the number of pull events in the last 24h.
message GetDailyPullCountResponse {
  int64 count = 1;
}

// GetRepoActivityRequest filters audit events to a single repository.
message GetRepoActivityRequest {
  // tenant_id scopes the query to prevent cross-tenant data leakage.
  string tenant_id = 1;
  // repository_name is the canonical "org/repo" form as stored in event payloads.
  string repository_name = 2;
  // since is the lower bound on occurred_at. Zero ⇒ default to 7 days ago.
  // Capped server-side at 90 days back to align with partition retention.
  google.protobuf.Timestamp since = 3;
  // limit caps the number of returned records; 0 ⇒ default 50. Hard cap 200.
  int32 limit = 4;
  // page_token is the opaque cursor returned by a prior call. Base64 of the
  // tuple "(occurred_at RFC3339Nano|event_id)" — stable across same-instant
  // events because the secondary sort key (event_id) is the table PK.
  string page_token = 5;
  // event_types optionally restricts the result to the listed action values
  // (e.g. "push.image", "scan.completed"). Empty list ⇒ the operator-facing
  // default allowlist enforced by the handler. Unknown values are rejected
  // server-side to keep the SQL IN list parameterised + injection-safe.
  repeated string event_types = 6;
}

// RepoActivityEvent is one audit event in a repository's activity stream.
// Payload fields are extracted server-side; the full raw payload never crosses
// the wire so we don't accidentally leak IPs, tokens, or future PII added to
// upstream payload structs.
message RepoActivityEvent {
  // event_id is the UUID of the audit_events row.
  string event_id = 1;
  // event_type is the action column (e.g. "push.image", "scan.completed").
  string event_type = 2;
  // occurred_at is the wall-clock time of the event.
  google.protobuf.Timestamp occurred_at = 3;
  // actor_id is the user UUID (or "system") that initiated the action.
  string actor_id = 4;
  // actor_username is best-effort extracted from event metadata; empty when not present.
  string actor_username = 5;
  // tag is extracted from event metadata when applicable (push, delete.tag).
  string tag = 6;
  // digest is extracted from event metadata when applicable (push manifest_digest,
  // scan manifest_digest, image.signed).
  string digest = 7;
  // summary is a short human-readable description suitable for direct UI render.
  string summary = 8;
  // outcome is the audit outcome ("success" | "failure"). Useful when the
  // event_type alone (e.g. "scan.completed") doesn't carry the verdict.
  string outcome = 9;
}

// GetRepoActivityResponse carries a page of events plus the next cursor.
message GetRepoActivityResponse {
  repeated RepoActivityEvent events = 1;
  // next_page_token is empty when there is no next page.
  string next_page_token = 2;
}

// GetNotificationsRequest scopes notifications to a single tenant.
// Filtering and pagination semantics mirror GetRepoActivityRequest so the same
// page_token format ("base64URL(RFC3339Nano|event_id)") can be reused on the
// frontend across both feeds.
message GetNotificationsRequest {
  // tenant_id scopes the query to prevent cross-tenant data leakage.
  string tenant_id = 1;
  // since lower-bounds occurred_at; zero ⇒ default 7 days ago. Clamped at
  // 90 days back by the handler to align with partition retention.
  google.protobuf.Timestamp since = 2;
  // limit caps the number of rows returned; 0 ⇒ default 50, cap 200.
  int32 limit = 3;
  // page_token is the opaque cursor returned by a prior call. Same encoding
  // as GetRepoActivity — base64URL of "<RFC3339Nano>|<event_id UUID>".
  string page_token = 4;
  // event_types optionally restricts the result. Empty ⇒ the operator-facing
  // notification default set (see notificationRenderer). Unknown values are
  // rejected by the handler before they reach SQL.
  repeated string event_types = 5;
}

// NotificationEvent is one row of the notification feed. Like RepoActivityEvent
// the raw payload never crosses the wire — only a curated set of fields plus a
// rendered title/summary/link suitable for direct UI display.
message NotificationEvent {
  // event_id is the UUID of the audit_events row.
  string event_id = 1;
  // event_type is the audit action column (e.g. "push.image", "scan.completed").
  string event_type = 2;
  // occurred_at is the wall-clock time of the event.
  google.protobuf.Timestamp occurred_at = 3;
  // actor_id is the user UUID (or "system") that initiated the action.
  string actor_id = 4;
  // actor_username is best-effort extracted from event metadata; empty when not present.
  string actor_username = 5;
  // title is a short, human-readable heading (e.g. "Push completed").
  string title = 6;
  // summary is a one-line body for the notification card.
  string summary = 7;
  // link is a relative dashboard path the bell click should route to.
  string link = 8;
  // metadata carries a small, hand-picked map of payload fields (repo, tag,
  // digest, etc.) so the UI can render extra context without parsing the
  // summary string. Keys are stable; values are plain strings to keep the
  // wire shape narrow.
  map<string, string> metadata = 9;
}

// GetNotificationsResponse carries a page of notifications plus a cursor.
// unread_count is the number of rows in this page — the backend does not
// store per-user read state. The frontend persists a last_seen_at locally
// and may pass it as `since` to compute its own unread count.
message GetNotificationsResponse {
  repeated NotificationEvent notifications = 1;
  // next_page_token is empty when there is no next page.
  string next_page_token = 2;
  // unread_count is len(notifications) — see method comment for the
  // server-side "unread" semantics.
  int32 unread_count = 3;
}

// ─── FE-API-028: last tenant push ───────────────────────────────────────────

// GetLastTenantPushRequest scopes the query to a single tenant.
message GetLastTenantPushRequest {
  string tenant_id = 1;
}

// GetLastTenantPushResponse carries the most recent push.image timestamp for
// the tenant. last_push_at is the zero timestamp when the tenant has never
// pushed an image. Callers MUST distinguish via timestamppb.AsTime().IsZero()
// rather than relying on absence of the field.
message GetLastTenantPushResponse {
  google.protobuf.Timestamp last_push_at = 1;
}
