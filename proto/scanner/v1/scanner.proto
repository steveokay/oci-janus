syntax = "proto3";

package registry.scanner.v1;

option go_package = "github.com/steveokay/oci-janus/proto/gen/go/scanner/v1;scannerv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ScannerService {
  rpc TriggerScan(TriggerScanRequest) returns (TriggerScanResponse);
  rpc GetScanStatus(GetScanStatusRequest) returns (GetScanStatusResponse);

  // FE-API-018 — scan policies CRUD.
  //
  // GetScanPolicy returns the per-tenant scan policy. When no row exists for
  // the tenant the service returns a zero-valued default policy rather than
  // NOT_FOUND so the dashboard can render the "no policy yet" state without
  // a separate code path.
  rpc GetScanPolicy(GetScanPolicyRequest) returns (ScanPolicy);
  // UpdateScanPolicy upserts the per-tenant scan policy. Validation is
  // applied by the gRPC layer; the management BFF performs an additional
  // RBAC check (admin/owner role) before forwarding.
  rpc UpdateScanPolicy(UpdateScanPolicyRequest) returns (ScanPolicy);

  // FE-API-049 — org-default + per-repo override scan policies.
  //
  // Mirrors the FE-API-037/039 retention pattern: per-repo override wins,
  // org default applies when no per-repo row exists (and only when
  // enabled=true — a disabled default DOES NOT propagate), tenant policy
  // is the bottom-of-chain fallback. Auto-scan-on-push at the consumer
  // resolves the effective policy per push via GetEffectiveScanPolicy
  // (services/scanner/internal/worker/worker.go HandlePushCompleted).
  //
  // RBAC posture at the BFF:
  //   - GET org default        — org reader+
  //   - PUT/DELETE org default — org admin/owner only (writer not enough;
  //                              scan policy gates push admission)
  //   - GET per-repo override  — repo reader+
  //   - PUT/DELETE per-repo    — repo admin/owner only
  // Writer is intentionally NOT enough on the writes — a writer can push
  // images but should not be able to change the gate they're being
  // pushed against.

  // GetOrgScanPolicy returns the default scan policy attached to an
  // organisation. NotFound when no row exists; the BFF surfaces that as
  // a typed empty state so the dashboard can render "no org default
  // yet" without a separate code path.
  rpc GetOrgScanPolicy(GetOrgScanPolicyRequest) returns (ScanPolicy);
  // UpsertOrgScanPolicy creates or updates the org default. updated_by
  // sourced from the JWT user_id, never client-supplied.
  rpc UpsertOrgScanPolicy(UpsertOrgScanPolicyRequest) returns (ScanPolicy);
  // DeleteOrgScanPolicy removes the org default. Repos that previously
  // inherited fall back to the tenant policy (or the synthesized default
  // when no tenant row exists either).
  rpc DeleteOrgScanPolicy(DeleteOrgScanPolicyRequest) returns (google.protobuf.Empty);

  // GetRepoScanPolicy returns a per-repo override. NotFound when no
  // override exists (the repo is inheriting from org / tenant).
  rpc GetRepoScanPolicy(GetRepoScanPolicyRequest) returns (ScanPolicy);
  // UpsertRepoScanPolicy creates or updates the per-repo override.
  rpc UpsertRepoScanPolicy(UpsertRepoScanPolicyRequest) returns (ScanPolicy);
  // DeleteRepoScanPolicy removes the per-repo override; the repo falls
  // back to the org default (or tenant fallback) on the next push.
  rpc DeleteRepoScanPolicy(DeleteRepoScanPolicyRequest) returns (google.protobuf.Empty);

  // GetEffectiveScanPolicy resolves what policy actually applies to a
  // given repository: per-repo override → org default (only when
  // enabled=true) → tenant policy → synthesized auto_scan_on_push=true
  // default. Never NotFound — the chain always terminates because the
  // synthesized default is always available. The inherited_from field
  // on the response labels the source ("repo" | "org" | "tenant" |
  // "default") so the dashboard can render the right "(inherited)"
  // label without a second round-trip. Called by the scanner consumer
  // on every push.completed event.
  rpc GetEffectiveScanPolicy(GetEffectiveScanPolicyRequest) returns (EffectiveScanPolicy);

  // FUT-017 — per-upstream proxy-cache scan policy.
  //
  // services/proxy emits events.RoutingCachePopulated after every
  // successful cache write. The scanner consumer
  // (worker.HandleCachePopulated) looks up the policy keyed by
  // (tenant_id, upstream_name); when auto_scan is true the manifest
  // digest is queued for the same worker pool that handles pushed
  // images.
  //
  // Get returns an empty/disabled policy when no row exists rather than
  // NotFound so the dashboard can render the "never configured" state
  // without a separate code path (mirrors GetScanPolicy's per-tenant
  // synthesised default).
  rpc GetProxyCacheScanPolicy(GetProxyCacheScanPolicyRequest) returns (ProxyCacheScanPolicy);
  // Set upserts the (tenant_id, upstream_name) row; the BFF performs
  // the RBAC check (org admin/owner) before forwarding.
  rpc SetProxyCacheScanPolicy(SetProxyCacheScanPolicyRequest) returns (ProxyCacheScanPolicy);
  // List streams every per-upstream row for a tenant. Server streams so
  // the FE can render a long table incrementally; ordering is by
  // upstream_name ASC so the rows are stable across calls.
  rpc ListProxyCacheScanPolicies(ListProxyCacheScanPoliciesRequest) returns (stream ProxyCacheScanPolicy);

  // FE-API-019 — compliance reports.
  //
  // GenerateComplianceReport kicks off an asynchronous report job and
  // returns the freshly created report_id immediately. The actual report
  // (PDF + SPDX JSON SBOM) is produced by a background poller; status is
  // observed via GetComplianceReport.
  rpc GenerateComplianceReport(GenerateComplianceReportRequest) returns (GenerateComplianceReportResponse);
  // GetComplianceReport returns one report row by id. The download_*_url
  // fields are populated only when status == "succeeded" — they are now
  // an internal hint (the scanner uses them to resolve the on-disk path
  // inside its own filesystem) and should NOT be used by remote callers
  // to fetch bytes; the streaming DownloadComplianceReport RPC below is
  // the supported path. The fields stay on the wire as a "ready" sentinel
  // for the dashboard.
  rpc GetComplianceReport(GetComplianceReportRequest) returns (ComplianceReport);
  // ListComplianceReports returns recent reports for a tenant, paginated.
  rpc ListComplianceReports(ListComplianceReportsRequest) returns (ListComplianceReportsResponse);
  // DownloadComplianceReport (REM-012) streams the rendered PDF or SPDX
  // JSON report bytes back to the caller. The scanner reads the file from
  // its own filesystem and chunks it in ~64KB pieces; the management BFF
  // proxies the stream into the client HTTP response. This RPC replaces
  // the v1 shortcut of returning an absolute on-disk path on GetReport
  // and having callers open the file themselves — that breaks the moment
  // scanner and management are on different nodes.
  //
  // The first ReportChunk carries content_type (e.g. "application/pdf")
  // so the BFF can set Content-Type on the HTTP response before forwarding
  // any bytes; subsequent chunks carry data only. NotFound when the
  // report id does not exist (or belongs to another tenant);
  // FailedPrecondition when the report is not yet succeeded; Internal
  // when the on-disk artifact is missing despite the row claiming
  // success (storage corruption — surfaced distinctly so operators see
  // "your data is gone" vs "still rendering").
  rpc DownloadComplianceReport(DownloadComplianceReportRequest) returns (stream ReportChunk);

  // --------------------------------------------------------------------------
  // REM-011 Phase 2 — adapter management
  //
  // These RPCs let a platform admin discover which scanner adapter binaries
  // are baked into the running image, pick which one services new scan jobs,
  // exercise the active adapter with a deterministic test scan, and read
  // worker-pool health for the UI's degradation logic.
  //
  // All five are platform-admin gated at the BFF (org=*, admin marker grant)
  // because picking the active scanner affects every tenant on the deployment.
  // --------------------------------------------------------------------------

  // ListInstalledAdapters enumerates every executable binary the scanner
  // service discovered at startup under its adapter directory (default
  // /usr/local/bin/scanner-*). Includes the SHA-256 checksum so the
  // dashboard can render a verifiable identity per binary.
  rpc ListInstalledAdapters(google.protobuf.Empty) returns (ListInstalledAdaptersResponse);
  // GetActiveAdapter returns the single adapter the worker pool is
  // currently dispatching jobs to. NotFound when nothing is active
  // (only possible during a misconfigured boot).
  rpc GetActiveAdapter(google.protobuf.Empty) returns (Adapter);
  // SetActiveAdapter atomically swaps the worker-pool scanner pointer
  // and persists the choice in scanner_settings so the selection
  // survives a restart. In-flight scans complete on their original
  // adapter; the next job picks up the new one.
  rpc SetActiveAdapter(SetActiveAdapterRequest) returns (Adapter);
  // RunTestScan exercises the currently active adapter end-to-end
  // (queue → plugin → metadata persist) using a known dev fixture
  // and returns timing + severity counts so the admin UI can confirm
  // the adapter is wired correctly after a swap.
  rpc RunTestScan(google.protobuf.Empty) returns (TestScanResponse);
  // GetScannerHealth returns liveness + recent-job stats sourced from
  // in-memory worker pool state. The frontend uses last_successful_scan_at
  // to replace the 90s client-side stuck-pending heuristic shipped in
  // Phase 1.
  rpc GetScannerHealth(google.protobuf.Empty) returns (ScannerHealthResponse);
}

message TriggerScanRequest {
  string tenant_id        = 1;
  string repository_name  = 2;
  string manifest_digest  = 3;
}

message TriggerScanResponse {
  string scan_id = 1;
}

message GetScanStatusRequest {
  string scan_id   = 1;
  string tenant_id = 2;
}

message GetScanStatusResponse {
  string status  = 1; // pending|running|complete|failed
  map<string, int32> severity_counts = 2;
  google.protobuf.Timestamp completed_at = 3;
}

// ----------------------------------------------------------------------------
// FE-API-018 — scan policies
// ----------------------------------------------------------------------------

// ScanPolicy is the configuration that drives the scanner's automatic
// scan-on-push behaviour and severity-based push blocking. Used at three
// scopes:
//
//   - tenant: the original FE-API-018 row; legacy fallback when no
//     org/repo policy exists. tenant_id set, org_id + repo_id empty.
//   - org: FE-API-049 org default. org_id + tenant_id set, repo_id empty.
//   - repo: FE-API-049 per-repo override. repo_id + tenant_id set, org_id
//     empty (the BFF resolves repo→org from metadata if it ever needs to
//     surface the parent).
//
// inherited_from labels the source when this message is returned via
// GetEffectiveScanPolicy: "repo" | "org" | "tenant" | "default" (the
// synthesized auto_scan_on_push=true fallback). The label is empty when
// returned via the direct Get*ScanPolicy endpoints.
message ScanPolicy {
  string tenant_id            = 1;
  // auto_scan_on_push triggers a scan whenever a manifest push completes.
  bool   auto_scan_on_push    = 2;
  // block_on_severity is the lowest severity that should block a push; empty
  // string means "never block". One of: "", CRITICAL, HIGH, MEDIUM, LOW.
  string block_on_severity    = 3;
  // exempt_cves are CVE IDs that the policy ignores when deciding whether to
  // block — useful for known false-positives. Each entry must match
  // ^CVE-\d{4}-\d{4,7}$ (validated at the BFF).
  repeated string exempt_cves = 4;
  // scanner_plugin selects the scanner backend. Allowlist enforced at the
  // BFF: currently "trivy" or "grype".
  string scanner_plugin       = 5;
  // scanner_version_pin pins a specific plugin version for reproducible
  // scans; empty means "use whatever version the scanner pool launched
  // with".
  string scanner_version_pin  = 6;
  google.protobuf.Timestamp updated_at = 7;
  // updated_by is the user_id of the last actor; empty for the default
  // policy returned on a cache miss.
  string updated_by           = 8;
  // enabled flips the whole policy on/off without losing the rule
  // configuration. A disabled org default does NOT propagate to inheriting
  // repos (mirrors FE-API-039 semantics). The per-tenant policy ignores
  // this field for backward compatibility — set true at boot for new rows.
  bool   enabled              = 9;
  // FE-API-049: scope identifiers. Exactly one of org_id / repo_id is set
  // for non-tenant policies; both empty means this is a tenant-scoped
  // row (the pre-FE-API-049 shape).
  string org_id               = 10;
  string repo_id              = 11;
}

message GetScanPolicyRequest {
  string tenant_id = 1;
}

message UpdateScanPolicyRequest {
  string tenant_id            = 1;
  bool   auto_scan_on_push    = 2;
  string block_on_severity    = 3;
  repeated string exempt_cves = 4;
  string scanner_plugin       = 5;
  string scanner_version_pin  = 6;
  // updated_by is the caller's user_id, threaded through so the audit
  // record on the table reflects who made the change.
  string updated_by           = 7;
}

// ----------------------------------------------------------------------------
// FE-API-049 — org / per-repo scan policy messages
// ----------------------------------------------------------------------------

// Org-default request shape. tenant_id is the platform-level scope;
// org_id identifies the org within that tenant.
message GetOrgScanPolicyRequest {
  string tenant_id = 1;
  string org_id    = 2;
}

message UpsertOrgScanPolicyRequest {
  string tenant_id            = 1;
  string org_id               = 2;
  bool   auto_scan_on_push    = 3;
  string block_on_severity    = 4;
  repeated string exempt_cves = 5;
  string scanner_plugin       = 6;
  string scanner_version_pin  = 7;
  // enabled flips the policy off without losing config. Disabled org
  // defaults do not propagate (mirrors FE-API-039 semantics).
  bool   enabled              = 8;
  string updated_by           = 9;
}

message DeleteOrgScanPolicyRequest {
  string tenant_id = 1;
  string org_id    = 2;
}

// Per-repo override request shape. repo_id is sufficient — the metadata
// table already carries the tenant_id, so the scanner enforces tenant
// scoping by looking up the repo's tenant on every write.
message GetRepoScanPolicyRequest {
  string tenant_id = 1;
  string repo_id   = 2;
}

message UpsertRepoScanPolicyRequest {
  string tenant_id            = 1;
  string repo_id              = 2;
  bool   auto_scan_on_push    = 3;
  string block_on_severity    = 4;
  repeated string exempt_cves = 5;
  string scanner_plugin       = 6;
  string scanner_version_pin  = 7;
  bool   enabled              = 8;
  string updated_by           = 9;
}

message DeleteRepoScanPolicyRequest {
  string tenant_id = 1;
  string repo_id   = 2;
}

// GetEffectiveScanPolicyRequest resolves the inheritance chain for one
// repository. org_id is optional — when empty the service looks up the
// repo's org from metadata; supplying it skips that lookup so the
// scanner consumer (HandlePushCompleted) can avoid an extra round-trip
// since the push.completed payload already carries enough context.
message GetEffectiveScanPolicyRequest {
  string tenant_id = 1;
  string repo_id   = 2;
  // org_id is optional. When set, the scanner uses it directly. When
  // empty, the scanner consults the metadata service to resolve the
  // repo→org parent. Either way the result is the same.
  string org_id    = 3;
}

// EffectiveScanPolicy wraps the resolved policy with the source label so
// the caller can render "(inherited from …)" without a second call.
message EffectiveScanPolicy {
  ScanPolicy policy = 1;
  // inherited_from is one of: "repo" | "org" | "tenant" | "default".
  // "default" means no row was found at any scope and the synthesized
  // auto_scan_on_push=true fallback applies (matches the original
  // FE-API-018 cache-miss behaviour for the per-tenant path).
  string inherited_from = 2;
}

// ----------------------------------------------------------------------------
// FE-API-019 — compliance reports
// ----------------------------------------------------------------------------

// ComplianceReport is one async report-generation job.
message ComplianceReport {
  string report_id     = 1;
  string tenant_id     = 2;
  string requested_by  = 3;
  google.protobuf.Timestamp requested_at  = 4;
  google.protobuf.Timestamp started_at    = 5;
  google.protobuf.Timestamp completed_at  = 6;
  // status is one of: pending | running | succeeded | failed.
  string status        = 7;
  string error_message = 8;
  // download_pdf_url is populated when status == "succeeded". The current
  // v1 implementation returns an absolute on-disk path; production
  // deployments should re-front this with object storage + signed URLs.
  string download_pdf_url  = 9;
  string download_sbom_url = 10;
}

message GenerateComplianceReportRequest {
  string tenant_id    = 1;
  string requested_by = 2;
}

message GenerateComplianceReportResponse {
  string report_id = 1;
  string status    = 2; // always "pending" at create time
}

message GetComplianceReportRequest {
  string tenant_id = 1;
  string report_id = 2;
}

message ListComplianceReportsRequest {
  string tenant_id  = 1;
  // status filters to one status (pending|running|succeeded|failed); empty
  // returns all statuses.
  string status     = 2;
  // page_size caps the response. Server enforces a hard max of 200.
  int32  page_size  = 3;
  // page_token is opaque to the caller. Empty starts at the newest report.
  string page_token = 4;
}

message ListComplianceReportsResponse {
  repeated ComplianceReport reports = 1;
  string next_page_token = 2;
}

// DownloadComplianceReportRequest selects which report to stream and
// which artifact format to return. tenant_id is enforced server-side so
// a malformed report_id can't surface another tenant's bytes.
message DownloadComplianceReportRequest {
  string tenant_id = 1;
  string report_id = 2;
  // format is either "pdf" or "sbom". Anything else returns
  // InvalidArgument so a typo doesn't silently return the wrong file
  // (the scanner stores both PDF and SPDX JSON for every succeeded
  // report).
  string format = 3;
}

// ReportChunk is one piece of the streamed file body.
//
// The FIRST chunk carries `content_type` populated (e.g. "application/pdf"
// or "application/json") so the proxy can set Content-Type on its HTTP
// response before any bytes flow. Subsequent chunks leave content_type
// empty and carry only `data`. The final chunk may be a zero-length
// `data` — the server closes the stream when the file is fully sent.
//
// We use ~64KB chunks (server-side knob) to balance per-message overhead
// against memory footprint. The BFF can io.Copy from the stream to the
// HTTP response writer without buffering the full payload — keeps a
// multi-MB PDF from sitting in management's RAM.
message ReportChunk {
  bytes data = 1;
  string content_type = 2;
}

// ----------------------------------------------------------------------------
// REM-011 Phase 2 — adapter management messages
// ----------------------------------------------------------------------------

// Adapter identifies one scanner plugin binary that the service has
// discovered + verified. version stays "unknown" until the registry
// observes a first successful scan from this adapter — the value comes
// from the JSON-RPC response payload (no separate `version` RPC on the
// plugin contract).
message Adapter {
  // name is derived from the filename (the suffix after "scanner-") so it
  // is stable across rebuilds. The same logical adapter shipped in two
  // separate images at different paths will report the same name.
  string name = 1;
  // version is the plugin's self-reported version, backfilled lazily.
  string version = 2;
  // path is the absolute on-disk location of the binary inside the
  // scanner container.
  string path = 3;
  // checksum is the SHA-256 hex of the binary, computed at startup.
  // Operators verify this against the build output before promoting
  // an adapter to active.
  string checksum = 4;
  int64 size_bytes = 5;
  // env_keys is the union of the orchestrator's pluginEnv() allowlist
  // (PATH, HOME, etc.) and any TRIVY_/GRYPE_-prefixed env vars present
  // in the scanner container at startup. The UI surfaces this so admins
  // know which adapter-specific config keys the binary can see.
  repeated string env_keys = 6;
  bool active = 7;
}

message ListInstalledAdaptersResponse {
  repeated Adapter adapters = 1;
  // active_adapter_path is the absolute path of the currently active
  // binary. Repeated in the envelope (in addition to Adapter.active)
  // so a UI that only renders the active card doesn't need to iterate
  // the full list.
  string active_adapter_path = 2;
}

message SetActiveAdapterRequest {
  // adapter_path must match one of the paths from ListInstalledAdapters.
  // The service rejects unknown paths with InvalidArgument — the registry
  // is the source of truth for what's allowed.
  string adapter_path = 1;
  // actor_user_id is the caller's user_id, persisted on scanner_settings
  // so the audit trail records who made the swap.
  string actor_user_id = 2;
}

message TestScanResponse {
  bool ok = 1;
  string scanner_name = 2;
  string scanner_version = 3;
  // duration_ms covers the full lifecycle: queue enqueue → adapter
  // returns → scan_results row visible via metadata. Useful for
  // verifying perf after a swap.
  int64 duration_ms = 4;
  map<string, int32> severity_counts = 5;
  // error_message is populated when ok=false; safe to render verbatim
  // in the admin UI (the dev fixture is well-known).
  string error_message = 6;
}

// ----------------------------------------------------------------------------
// FUT-017 — proxy-cache scan policies
// ----------------------------------------------------------------------------

// ProxyCacheScanPolicy is the per-(tenant, upstream) row that controls
// whether services/scanner auto-queues a scan when services/proxy
// emits a cache.populated event.
//
// Keyed by upstream_name (not upstream_id) so a policy survives an
// upstream credential rotation that changes the row's UUID. The
// services/proxy publisher fills upstream_name on every event payload.
message ProxyCacheScanPolicy {
  string tenant_id          = 1;
  // upstream_name is the operator-chosen handle for the upstream
  // (e.g. "dockerhub", "ghcr"). Lower-cased + validated by the BFF.
  string upstream_name      = 2;
  // auto_scan is the consumer's enqueue gate. False (the default)
  // means cached pulls are stored without a scan.
  bool   auto_scan          = 3;
  // severity_threshold is the lowest severity that should trigger the
  // same block-on-severity quarantine behaviour the per-tenant policy
  // provides. One of: "", "none", "low", "medium", "high", "critical".
  // Empty string and "none" both mean "never block".
  string severity_threshold = 4;
  google.protobuf.Timestamp updated_at = 5;
  // updated_by is the user_id of the last actor; empty for the
  // synthesised default returned on a cache miss.
  string updated_by         = 6;
}

message GetProxyCacheScanPolicyRequest {
  string tenant_id     = 1;
  string upstream_name = 2;
}

message SetProxyCacheScanPolicyRequest {
  string tenant_id          = 1;
  string upstream_name      = 2;
  bool   auto_scan          = 3;
  string severity_threshold = 4;
  // updated_by is the caller's user_id, threaded through so the audit
  // record on the row reflects who made the change.
  string updated_by         = 5;
}

message ListProxyCacheScanPoliciesRequest {
  string tenant_id = 1;
}

message ScannerHealthResponse {
  bool healthy = 1;
  // last_successful_scan_at is unset (nil) until the pool completes
  // its first scan after process start; the frontend treats nil as
  // "no scans yet" rather than "stale".
  google.protobuf.Timestamp last_successful_scan_at = 2;
  // queue_depth is the count of jobs sitting in the worker pool's
  // buffered channel waiting for a free worker.
  int64 queue_depth = 3;
  // in_flight_count is the number of scans currently running on
  // worker goroutines.
  int64 in_flight_count = 4;
  string active_adapter_name = 5;
  string active_adapter_version = 6;
  // active_adapter_engine_reachable is false when the active adapter runs
  // against an external engine sidecar (e.g. trivy-engine) that the scanner
  // could not reach on the last health probe. True when reachable OR when the
  // active adapter has no external engine (dev-stub). Lets /settings/scanning
  // show "degraded" for a deploy problem vs a genuine scan error.
  bool active_adapter_engine_reachable = 7;
  // active_adapter_engine_detail carries a short human string (e.g. the
  // engine URL + probe error) when active_adapter_engine_reachable is false.
  string active_adapter_engine_detail = 8;
}
