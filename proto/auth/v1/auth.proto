syntax = "proto3";

package registry.auth.v1;

option go_package = "github.com/steveokay/oci-janus/proto/gen/go/auth/v1;authv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// AuthService validates tokens and API keys for internal service consumption.
// Exposed only over mTLS gRPC — never directly to clients.
service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (GetUserPermissionsResponse);
  rpc GrantRole(GrantRoleRequest) returns (google.protobuf.Empty);
  rpc RevokeRole(RevokeRoleRequest) returns (google.protobuf.Empty);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  // CountTenantUsers (FE-API-028) returns the number of distinct user accounts
  // belonging to the tenant. Used by the admin tenant-detail composition; the
  // count includes inactive users intentionally (operators want to see total
  // headcount, not just currently-active sessions).
  rpc CountTenantUsers(CountTenantUsersRequest) returns (CountTenantUsersResponse);
  // LookupUsernames (REM-018-followup) batch-resolves a set of user_ids to
  // their username + best-available display_name within a tenant. Used by
  // services/management to enrich `/api/v1/notifications` + activity-feed
  // responses with operator-friendly labels without forcing the FE into a
  // per-row hydrate fan-out.
  //
  // Bounded: the handler rejects calls with >200 ids so a misbehaving BFF
  // can't fan out a 10k-id lookup. Unknown ids are silently dropped from
  // the response — caller iterates by id, treats absence as "render the
  // raw UUID / system label fallback". Anonymous / "system" sentinel
  // strings should be filtered out by the caller before the RPC.
  rpc LookupUsernames(LookupUsernamesRequest) returns (LookupUsernamesResponse);

  // FUT-012 Phase A — tenant-user lifecycle management. Three new RPCs
  // gated on tenant-admin OR platform-admin in services/management's
  // BFF. The handler-side check enforces the same shape so a
  // misbehaving BFF can't bypass.
  //
  // ListTenantUsers returns the full member list of a tenant with a
  // role-summary chip per user, paginated by cursor. Status is the new
  // 'active' | 'invited' | 'disabled' enum from migration 00002.
  rpc ListTenantUsers(ListTenantUsersRequest) returns (ListTenantUsersResponse);
  // InviteUser creates a users row in 'invited' status with a hashed
  // single-use token + absolute expiry. The raw token is returned ONCE
  // in the response so the operator can copy + share it; it's never
  // readable from the DB again. Phase 1 ships the copy-link affordance;
  // Phase 2 will wire an SMTP transport.
  rpc InviteUser(InviteUserRequest) returns (InviteUserResponse);
  // SetUserDisabled flips users.status between 'active' and 'disabled'.
  // On disable: all active JWT JTIs land in the Redis revoke set + all
  // API keys for the user are flipped is_active=false. On re-enable:
  // the user can log in again; API keys stay disabled (the operator
  // re-issues them deliberately).
  rpc SetUserDisabled(SetUserDisabledRequest) returns (SetUserDisabledResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid      = 1;
  // user_id is the authenticated principal. May be a service-account shadow
  // user id (kind='service_account'); join users.kind to distinguish.
  string user_id    = 2;
  string tenant_id  = 3;
  string jti        = 4;
  repeated RepositoryAccess access = 5;
  google.protobuf.Timestamp expires_at = 6;
  // roles is the flat list of role names held by the user in the tenant
  // (e.g. ["admin", "reader"]). Mirrors the `roles` claim embedded in the JWT.
  repeated string roles = 7;
}

message ValidateAPIKeyRequest {
  string key_id     = 1;
  string raw_secret = 2;
}

message ValidateAPIKeyResponse {
  bool   valid      = 1;
  // user_id is the authenticated principal. May be a service-account shadow
  // user id (kind='service_account'); join users.kind to distinguish.
  string user_id    = 2;
  string tenant_id  = 3;
  repeated RepositoryAccess access = 4;
}

message GetUserPermissionsRequest {
  string user_id   = 1;
  string tenant_id = 2;
}

message GetUserPermissionsResponse {
  repeated RepositoryAccess access = 1;
  // roles is a flat list of role names the user holds anywhere in the tenant.
  // DEPRECATED for authorization decisions — use role_assignments which includes
  // the scope. Retained for backwards compatibility and for embedding in the
  // JWT `roles` claim (where the frontend uses it only for UX-level gating).
  repeated string roles = 2;
  // role_assignments is the full per-scope assignment list, the only safe
  // source of truth for scope-aware authorization checks (PENTEST-002).
  repeated RoleAssignment role_assignments = 3;
}

message RepositoryAccess {
  string type    = 1; // "repository"
  string name    = 2; // "org/repo"
  repeated string actions = 3; // ["push", "pull"]
}

// RoleAssignment represents a user's role within a specific scope.
//
// REM-018 enrichment (fields 7-10): the BFF used to surface raw UUIDs in
// member tables, audit-event actor cells, and granted-by columns. The auth
// service is the system of record for these joins, so it returns the
// principal's username + best-available display label inline with the
// assignment rather than forcing the BFF (or worse, the FE) to do per-row
// hydrate fan-outs against /api/v1/users/{id}.
//
// Username is the literal users.username (always non-empty). DisplayName is
// COALESCE(service_accounts.name, users.display_name, users.username,
// users.email) — the primary label the FE renders. Equals Username when no
// display_name is set, which is the natural fallback the UserCell primitive
// uses to decide whether to show "Name (@handle)" vs just "@handle".
//
// GrantedByUsername + GrantedByDisplayName are empty strings when granted_by
// is the system zero-UUID (no LEFT JOIN row matches), so the BFF can emit a
// stable absent-shape without inventing placeholders.
message RoleAssignment {
  string id                       = 1;
  string user_id                  = 2;
  string role                     = 3; // "owner" | "admin" | "writer" | "reader"
  string scope_type               = 4; // "org" | "repo"
  string scope_value              = 5; // org name or "org/repo"
  string granted_by               = 6;
  string username                 = 7;
  string display_name             = 8;
  string granted_by_username      = 9;
  string granted_by_display_name  = 10;
}

// GrantRoleRequest assigns a named role to a user within a tenant scope.
message GrantRoleRequest {
  string tenant_id   = 1;
  string user_id     = 2;
  string role        = 3; // "owner" | "admin" | "writer" | "reader"
  string scope_type  = 4; // "org" | "repo"
  string scope_value = 5;
  string granted_by  = 6;
}

// RevokeRoleRequest removes a specific role assignment by its ID.
// expected_scope_type and expected_scope_value defend against scope-confusion
// attacks (PENTEST-011) — when provided, the auth service refuses to delete
// an assignment whose scope does not match. Pass them whenever the caller
// derived the scope from a URL path (e.g. DELETE /orgs/{org}/members/{id}).
message RevokeRoleRequest {
  string tenant_id            = 1;
  string assignment_id        = 2;
  string expected_scope_type  = 3; // "org" | "repo" | "" for no check
  string expected_scope_value = 4; // org name or "org/repo"; "" for no check
}

// ListMembersRequest queries all role assignments within a tenant scope.
//
// FUT-012: scope_type widened from ("org" | "repo") to ("org" | "repo" |
// "tenant") to support tenant-admin grants. The repo + handler enforce
// the constraint; the wire shape stays a string for forward-compat.
message ListMembersRequest {
  string tenant_id   = 1;
  string scope_type  = 2; // "org" | "repo" | "tenant"
  string scope_value = 3;
}

// ListMembersResponse contains all role assignments for the requested scope.
message ListMembersResponse {
  repeated RoleAssignment members = 1;
}

// CountTenantUsersRequest scopes the user count to a single tenant.
message CountTenantUsersRequest {
  string tenant_id = 1;
}

// CountTenantUsersResponse carries the integer user count for the tenant.
message CountTenantUsersResponse {
  int64 count = 1;
}

// LookupUsernamesRequest carries the batch of user_ids to resolve. Bounded
// at 200 ids per call — the handler returns InvalidArgument above that.
message LookupUsernamesRequest {
  string tenant_id = 1;
  repeated string user_ids = 2;
}

// UserLookupResult is the resolved (username, display_name) pair for one
// user_id. display_name mirrors the COALESCE fallback chain used by
// ListMembers (service_accounts.name → users.display_name → users.username
// → users.email) so callers can render a single label without parsing the
// fallback themselves.
message UserLookupResult {
  string user_id      = 1;
  string username     = 2;
  string display_name = 3;
}

// LookupUsernamesResponse returns one entry per resolved user_id. Unknown
// ids are silently dropped — callers iterate by their input set and treat
// absence as "not in this tenant, render the UUID / system fallback".
message LookupUsernamesResponse {
  repeated UserLookupResult users = 1;
}

// FUT-012 Phase A messages ──────────────────────────────────────────────

// RoleSummary is the per-user role aggregate ListTenantUsers returns
// alongside each row. Org-level admin / writer / reader counts are
// emitted as separate fields so the FE doesn't have to parse a list to
// render the "Owns 3 / Writes 7 / Reads 12" chip. tenant_admin is the
// new boolean from the 'tenant' scope grant; platform_admin reflects
// the `(admin, org, '*')` marker.
message RoleSummary {
  int32 org_admin_count   = 1;
  int32 org_writer_count  = 2;
  int32 org_reader_count  = 3;
  int32 repo_grant_count  = 4;
  bool  tenant_admin      = 5;
  bool  platform_admin    = 6;
}

// TenantUser carries one user row from ListTenantUsers. Status is the
// migrated `users.status` enum value. last_login_at is unset (zero) for
// users who have never logged in or who only authenticate via API key.
message TenantUser {
  string user_id       = 1;
  string username      = 2;
  string display_name  = 3;
  string email         = 4;
  string kind          = 5; // "human" | "service_account"
  string status        = 6; // "active" | "invited" | "disabled"
  google.protobuf.Timestamp last_login_at = 7;
  google.protobuf.Timestamp created_at    = 8;
  RoleSummary roles    = 9;
}

// ListTenantUsersRequest is paginated by cursor. page_size is clamped
// to [1, 200] server-side. page_token is opaque to the caller — empty
// means "first page".
message ListTenantUsersRequest {
  string tenant_id  = 1;
  int32  page_size  = 2;
  string page_token = 3;
}

message ListTenantUsersResponse {
  repeated TenantUser users           = 1;
  string              next_page_token = 2;
  int32               total_count     = 3;
}

// InviteUserRequest creates a users row in 'invited' status. invited_by
// is the caller's user_id, captured for audit. initial_org_role +
// initial_org_name are optional — when both are set, the invited user
// gets a role_assignments row the moment they accept the invite, so a
// fresh tenant doesn't require the inviter to follow up with a separate
// grant. expires_in_secs defaults to 7 days when zero.
message InviteUserRequest {
  string tenant_id          = 1;
  string email              = 2;
  string display_name       = 3;
  string invited_by         = 4;
  string initial_org_role   = 5; // optional; "" = no initial grant
  string initial_org_name   = 6; // optional; required iff initial_org_role != ""
  int64  expires_in_secs    = 7;
}

// InviteUserResponse returns the new user_id + the raw single-use
// invite token. The raw token is shown to the caller ONCE — only the
// argon2id hash is stored, and the DB has no way to surface the value
// on a follow-up read. The FE's expected UX: surface a copy-link
// affordance immediately after the InviteUser call returns.
message InviteUserResponse {
  string user_id        = 1;
  string invite_token   = 2;
  google.protobuf.Timestamp invite_expires_at = 3;
}

// SetUserDisabledRequest flips users.status between 'active' and
// 'disabled'. caller_user_id is captured for audit. The handler
// rejects status='invited' targets (a disable on a pending invite is
// the InviteUser caller's job to revoke via a token expiry, not this
// RPC).
message SetUserDisabledRequest {
  string tenant_id      = 1;
  string user_id        = 2;
  bool   disabled       = 3;
  string caller_user_id = 4;
}

message SetUserDisabledResponse {
  string status = 1; // resulting 'active' | 'disabled' after the flip
}
